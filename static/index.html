<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupa Operacyjna ZLY CHUJI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'Segoe UI Symbol', 'Apple Symbols',
                   'Noto Sans Symbols 2', 'Noto Sans Symbols',
                   sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: #1e2130;
      border-bottom: 1px solid #2d3348;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-corp { font-weight: 700; font-size: 1rem; color: #f8fafc; letter-spacing: 0.03em; }

    .nav-links { display: flex; gap: 0.25rem; }

    .nav-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .nav-btn:hover { color: #e2e8f0; background: #252a3d; }
    .nav-btn.active { color: #38bdf8; background: #0c2233; }

    .nav-right { display: flex; align-items: center; gap: 0.75rem; }

    .nav-char { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #94a3b8; }

    .nav-portrait {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid #2d3348;
      background: #252a3d;
    }

    .btn-logout {
      background: none;
      border: 1px solid #2d3348;
      color: #64748b;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-logout:hover { color: #f87171; border-color: #f87171; }

    /* ── Layout ── */
    main { padding: 2rem; }

    .layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.25rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 1.5rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Cards ── */
    .card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card.full { grid-column: 1 / -1; }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    /* ── Metric ── */
    .metric {
      background: #252a3d;
      border-radius: 8px;
      padding: 0.9rem 1rem;
    }

    .metric .label {
      font-size: 0.7rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }

    .metric .val { font-size: 1.6rem; font-weight: 700; color: #38bdf8; }
    .metric .unit { font-size: 0.8rem; color: #475569; margin-left: 0.2rem; }

    /* ── Progress ── */
    .progress-wrap { margin-top: 0.5rem; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.35rem;
    }

    .progress-bar {
      height: 6px;
      background: #252a3d;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #38bdf8;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      border-radius: 4px;
      padding: 0.1rem 0.45rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-blue   { background: #0c2233; color: #38bdf8; }
    .badge-green  { background: #052e16; color: #4ade80; }
    .badge-muted  { background: #1e2130; color: #475569; border: 1px solid #2d3348; }
    .badge-orange { background: #2d1a00; color: #fb923c; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 0.75rem; }

    th {
      text-align: left;
      padding: 0.4rem 0.6rem;
      color: #475569;
      font-weight: 500;
      font-size: 0.72rem;
      border-bottom: 1px solid #2d3348;
    }

    td { padding: 0.6rem 0.6rem; border-bottom: 1px solid #1a1e2e; color: #94a3b8; }
    tr:last-child td { border-bottom: none; }

    /* ── Character card ── */
    .char-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .char-portrait {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      border: 1px solid #2d3348;
      background: #252a3d;
    }

    .char-info .name { font-size: 1.1rem; font-weight: 700; color: #f8fafc; }
    .char-info .corp { font-size: 0.8rem; color: #64748b; margin-top: 0.2rem; }

    .sec-status {
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 0.4rem;
    }

    /* ── Metrics grid ── */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem; }

    /* ── Banner ── */
    .banner {
      background: #450a0a;
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 1.25rem;
      color: #fca5a5;
      font-size: 0.8rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      display: none;
    }

    .banner.show { display: block; }

    /* ── Login view ── */
    #view-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .login-corp {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.4rem;
    }

    .login-sub {
      font-size: 0.8rem;
      color: #475569;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #0c2233;
      border: 1px solid #38bdf8;
      border-radius: 8px;
      color: #38bdf8;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }

    .login-btn:hover {
      background: #38bdf8;
      color: #0f1117;
    }

    .login-btn:active { transform: translateY(1px); }

    .login-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Spinner ── */
    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #475569;
      font-size: 0.85rem;
    }

    /* ── Contract tabs ── */
    .tab-strip {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.25rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      border-bottom: 1px solid #2d3348;
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      color: #64748b;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active { color: #38bdf8; border-bottom-color: #38bdf8; }

    .tab-count {
      background: #252a3d;
      color: #475569;
      border-radius: 4px;
      padding: 0.05rem 0.35rem;
      font-size: 0.65rem;
      margin-left: 0.3rem;
      font-weight: 700;
    }

    .tab-btn.active .tab-count { background: #0c2233; color: #38bdf8; }

    .contract-pane { max-width: 1200px; margin: 0 auto; }

    .contract-empty { color: #475569; font-size: 0.85rem; padding: 1rem 0; }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Loading spinner -->
<div id="view-loading" class="spinner">Loading…</div>

<!-- Login view -->
<div id="view-login" class="hidden">
  <div class="login-card">
    <div class="login-corp">Grupa Operacyjna</div>
    <div class="login-corp" style="color:#38bdf8">ZLY CHUJI</div>
    <div class="login-sub">Corporation Portal · Members Only</div>
    <a href="/api/auth/login" class="login-btn">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2L4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4zm0 2.2L18 7v5c0 4-2.7 7.7-6 8.2-3.3-.5-6-4.2-6-8.2V7l6-2.8z"/>
      </svg>
      Log in with EVE Online
    </a>
  </div>
</div>

<!-- App shell (shown when authenticated) -->
<div id="view-app" class="hidden">

  <nav>
    <span class="nav-corp">ZLY CHUJI</span>
    <div class="nav-links">
      <button class="nav-btn active" id="btn-contracts" onclick="showView('contracts')">Contracts</button>
      <button class="nav-btn" id="btn-projects" onclick="showView('projects')">Projects</button>
      <button class="nav-btn" id="btn-structures" onclick="showView('structures')">Structures</button>
      <button class="nav-btn" id="btn-member" onclick="showView('member')">Member</button>
    </div>
    <div class="nav-right">
      <div class="nav-char">
        <img id="nav-portrait" class="nav-portrait" src="" alt="">
        <span id="nav-name"></span>
      </div>
      <a href="/api/auth/logout" class="btn-logout">Logout</a>
    </div>
  </nav>

  <main>
    <!-- Contracts view -->
    <div id="view-contracts">
      <div id="contracts-error" class="banner"></div>
      <div class="page-title">Corporation Contracts</div>
      <div class="tab-strip">
        <button class="tab-btn active" id="tab-hauling" onclick="showContractTab('hauling')">
          Hauling <span class="tab-count" id="count-hauling">0</span>
        </button>
        <button class="tab-btn" id="tab-abyssal" onclick="showContractTab('abyssal')">
          Abyssal <span class="tab-count" id="count-abyssal">0</span>
        </button>
        <button class="tab-btn" id="tab-others" onclick="showContractTab('others')">
          Other <span class="tab-count" id="count-others">0</span>
        </button>
      </div>
      <div id="pane-hauling" class="contract-pane"></div>
      <div id="pane-abyssal" class="contract-pane hidden"></div>
      <div id="pane-others"  class="contract-pane hidden"></div>
    </div>

    <!-- Projects view -->
    <div id="view-projects" class="hidden">
      <div id="projects-error" class="banner"></div>
      <div class="page-title">Corporation Projects</div>
      <div class="tab-strip">
        <button class="tab-btn active" id="tab-active" onclick="showProjectTab('active')">
          Active <span class="tab-count" id="count-active">0</span>
        </button>
        <button class="tab-btn" id="tab-closed" onclick="showProjectTab('closed')">
          Closed <span class="tab-count" id="count-closed">0</span>
        </button>
      </div>
      <div id="pane-active" class="contract-pane"></div>
      <div id="pane-closed" class="contract-pane hidden"></div>
    </div>

    <!-- Structures view -->
    <div id="view-structures" class="hidden">
      <div id="structures-error" class="banner"></div>
      <div class="page-title">Corporation Structures</div>
      <div class="tab-strip">
        <button class="tab-btn active" id="tab-citadels" onclick="showStructuresTab('citadels')">
          Citadels <span class="tab-count" id="count-citadels">0</span>
        </button>
        <button class="tab-btn" id="tab-poses" onclick="showStructuresTab('poses')">
          POSes <span class="tab-count" id="count-poses">0</span>
        </button>
      </div>
      <div id="pane-citadels" class="contract-pane"></div>
      <div id="pane-poses" class="contract-pane hidden"></div>
    </div>

    <!-- Member view -->
    <div id="view-member" class="hidden">
      <div id="member-error" class="banner"></div>
      <div class="page-title">Member Profile</div>
      <div id="member-grid" class="layout"></div>
    </div>
  </main>

</div>

<script>
  let currentUser = null;
  let contractsTimer = null;

  // ── Boot ──────────────────────────────────────────────────────────────────

  async function boot() {
    try {
      const r = await fetch('/api/auth/me');
      if (r.status === 401) { show('view-login'); return; }
      currentUser = await r.json();
      document.getElementById('nav-portrait').src =
        `https://images.evetech.net/characters/${currentUser.character_id}/portrait?size=64`;
      document.getElementById('nav-name').textContent = currentUser.character_name;
      show('view-app');
      showView('contracts');
    } catch { show('view-login'); }
  }

  // ── View switching ────────────────────────────────────────────────────────

  function show(id) {
    ['view-loading', 'view-login', 'view-app'].forEach(v =>
      document.getElementById(v).classList.toggle('hidden', v !== id)
    );
  }

  function showView(view) {
    ['contracts', 'projects', 'structures', 'member'].forEach(v => {
      document.getElementById('view-' + v).classList.toggle('hidden', view !== v);
      document.getElementById('btn-' + v).classList.toggle('active', view === v);
    });
    if (view === 'contracts') loadContracts();
    if (view === 'projects') loadProjects();
    if (view === 'structures') loadStructures();
    if (view === 'member') loadMember();
  }

  // ── Contracts ─────────────────────────────────────────────────────────────

  async function loadContracts() {
    if (contractsTimer) clearTimeout(contractsTimer);
    try {
      const r = await fetch('/api/contracts');
      if (!r.ok) {
        showError('contracts-error', r.status === 403
          ? 'Insufficient corporation roles to view contracts.'
          : 'ESI unavailable — contracts could not be loaded.');
        return;
      }
      hideError('contracts-error');
      renderContracts(await r.json());
    } catch {
      showError('contracts-error', 'Network error — could not load contracts.');
    }
    contractsTimer = setTimeout(loadContracts, 120000);
  }

  function showContractTab(tab) {
    ['hauling', 'abyssal', 'others'].forEach(t => {
      document.getElementById('pane-' + t).classList.toggle('hidden', t !== tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
  }

  function timeLeft(iso) {
    if (!iso) return '–';
    const diff = new Date(iso) - Date.now();
    if (diff <= 0) return 'Expired';
    const h = Math.floor(diff / 3600000);
    if (h < 1) return '<1h';
    if (h < 24) return h + 'h';
    return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
  }

  function statusBadge(s) {
    if (s === 'in_progress') return '<span class="badge badge-green">In Progress</span>';
    return '<span class="badge badge-blue">Outstanding</span>';
  }

  function renderContracts(data) {
    const { hauling = [], abyssal = [], others = [] } = data;

    document.getElementById('count-hauling').textContent = hauling.length;
    document.getElementById('count-abyssal').textContent = abyssal.length;
    document.getElementById('count-others').textContent  = others.length;

    // ── Hauling ──
    document.getElementById('pane-hauling').innerHTML = hauling.length ? `
      <div class="card full">
        <table>
          <thead><tr>
            <th>Route</th><th>Volume</th><th>Reward</th><th>Collateral</th><th>Hauler</th><th>Status</th><th>Expires</th>
          </tr></thead>
          <tbody>
            ${hauling.map(c => `
              <tr>
                <td style="color:#e2e8f0">
                  ${locWithType(c.start_name, c.start_type)}
                  <span style="color:#475569"> → </span>
                  ${locWithType(c.end_name, c.end_type)}
                  ${issuerLine(c)}
                </td>
                <td>${fmtNum(Math.round(c.volume || 0))} m³</td>
                <td style="color:#38bdf8">${fmtISK(c.reward || 0)} ISK</td>
                <td>${fmtISK(c.collateral || 0)} ISK</td>
                <td>${haulerCell(c)}</td>
                <td>${statusBadge(c.status)}</td>
                <td>${timeLeft(c.date_expired)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<p class="contract-empty">No active hauling contracts.</p>';

    // ── Abyssal / Auction ──
    document.getElementById('pane-abyssal').innerHTML = abyssal.length ? `
      <div class="card full">
        <table>
          <thead><tr>
            <th>Title</th><th>Starting Bid</th><th>Buyout</th><th>Status</th><th>Ends</th>
          </tr></thead>
          <tbody>
            ${abyssal.map(c => `
              <tr>
                <td style="color:#e2e8f0">
                  ${escHtml(c.title || 'Auction #' + c.contract_id)}
                  ${issuerLine(c)}
                </td>
                <td style="color:#38bdf8">${fmtISK(c.price || 0)} ISK</td>
                <td>${c.buyout ? fmtISK(c.buyout) + ' ISK' : '<span style="color:#475569">–</span>'}</td>
                <td>${statusBadge(c.status)}</td>
                <td>${timeLeft(c.date_expired)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<p class="contract-empty">No active abyssal auctions.</p>';

    // ── Others ──
    const typeLabel = t => ({ item_exchange: 'Item Exchange', courier: 'Courier',
      auction: 'Auction', loan: 'Loan' }[t] || t || 'Unknown');

    document.getElementById('pane-others').innerHTML = others.length ? `
      <div class="card full">
        <table>
          <thead><tr>
            <th>Title</th><th>Type</th><th>Price</th><th>Accepted by</th><th>Status</th><th>Expires</th>
          </tr></thead>
          <tbody>
            ${others.map(c => `
              <tr>
                <td style="color:#e2e8f0">
                  ${escHtml(c.title || 'Contract #' + c.contract_id)}
                  ${issuerLine(c)}
                </td>
                <td><span class="badge badge-muted">${typeLabel(c.type)}</span></td>
                <td>${c.price ? fmtISK(c.price) + ' ISK' : '<span style="color:#475569">–</span>'}</td>
                <td>${haulerCell(c)}</td>
                <td>${statusBadge(c.status)}</td>
                <td>${timeLeft(c.date_expired)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<p class="contract-empty">No other active contracts.</p>';
  }

  function issuerLine(c) {
    if (!c.issuer_name) return '';
    return `<div style="font-size:0.7rem;color:#475569;margin-top:0.2rem">
              by ${escHtml(c.issuer_name)}
            </div>`;
  }

  function haulerCell(c) {
    if (c.acceptor_name) {
      const accepted = c.date_accepted
        ? `<div style="font-size:0.65rem;color:#475569;margin-top:0.15rem">
             ${new Date(c.date_accepted).toLocaleDateString()}
           </div>`
        : '';
      return `<span style="color:#4ade80">${escHtml(c.acceptor_name)}</span>${accepted}`;
    }
    return '<span style="color:#475569">–</span>';
  }

  function shortLoc(name) {
    if (!name) return '–';
    // Shorten "Jita IV - Moon 4 - Caldari Navy Assembly Plant" → "Jita IV - Moon 4"
    const parts = name.split(' - ');
    return parts.length > 2 ? parts.slice(0, 2).join(' - ') : name;
  }

  function locWithType(name, type) {
    const typeBadge = type
      ? ` <span class="badge badge-muted" style="margin-left:0.25rem">${escHtml(type)}</span>`
      : '';
    return escHtml(shortLoc(name)) + typeBadge;
  }

  // ── Structures ────────────────────────────────────────────────────────────

  async function loadStructures() {
    try {
      const r = await fetch('/api/structures');
      if (!r.ok) {
        showError('structures-error', r.status === 403
          ? 'Insufficient corporation roles to view structures.'
          : 'ESI unavailable — structures could not be loaded.');
        return;
      }
      hideError('structures-error');
      renderStructures(await r.json());
    } catch {
      showError('structures-error', 'Network error — could not load structures.');
    }
  }

  function showStructuresTab(tab) {
    ['citadels', 'poses'].forEach(t => {
      document.getElementById('pane-' + t).classList.toggle('hidden', t !== tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
  }

  function renderStructures(data) {
    const { citadels = [], starbases = [] } = data;
    document.getElementById('count-citadels').textContent = citadels.length;
    document.getElementById('count-poses').textContent = starbases.length;
    document.getElementById('pane-citadels').innerHTML = citadelsTable(citadels);
    document.getElementById('pane-poses').innerHTML = posesTable(starbases);
  }

  function citadelsTable(list) {
    if (!list.length) return '<p class="contract-empty">No citadels.</p>';
    return `
      <div class="card full">
        <table>
          <thead><tr>
            <th>Name</th><th>Type</th><th>System</th><th>State</th><th>Fuel Expires</th>
          </tr></thead>
          <tbody>
            ${list.map(s => `
              <tr>
                <td style="color:#e2e8f0">${escHtml(s.name || ('Citadel #' + (s.structure_id || '')))}</td>
                <td><span class="badge badge-blue">${escHtml(s.type_name || '–')}</span></td>
                <td>${systemCell(s)}</td>
                <td>${citadelStateBadge(s.state)}</td>
                <td>${fuelExpires(s.fuel_expires)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function posesTable(list) {
    if (!list.length) return '<p class="contract-empty">No POSes.</p>';
    return `
      <div class="card full">
        <table>
          <thead><tr>
            <th>Type</th><th>System</th><th>State</th><th>Online Since</th><th></th>
          </tr></thead>
          <tbody>
            ${list.map((s, i) => `
              <tr id="pos-row-${i}" style="cursor:pointer" onclick="togglePosDetail(${i}, ${s.starbase_id}, ${s.system_id})">
                <td style="color:#e2e8f0">${escHtml(s.type_name || ('Type #' + (s.type_id || '')))}</td>
                <td>${systemCell(s)}</td>
                <td>${posStateBadge(s.state)}</td>
                <td>${s.onlined_since ? new Date(s.onlined_since).toLocaleDateString() : '–'}</td>
                <td style="color:#475569;font-size:0.7rem">▼</td>
              </tr>
              <tr id="pos-detail-${i}" class="hidden"><td colspan="5" style="background:#181b27;padding:0.75rem"></td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function systemCell(s) {
    const sec = (typeof s.security_status === 'number') ? ` <span style="color:${secColor(s.security_status)}">${s.security_status.toFixed(1)}</span>` : '';
    return `${escHtml(s.system_name || 'System #' + (s.system_id || ''))}${sec}`;
  }

  function secColor(v) {
    if (v >= 0.5) return '#4ade80';
    if (v >  0.0) return '#fb923c';
    return '#f87171';
  }

  function citadelStateBadge(state) {
    const map = {
      shield_vulnerable: ['badge-green', 'Vulnerable'],
      armor_reinforce:   ['badge-orange', 'Armor RF'],
      armor_vulnerable:  ['badge-orange', 'Armor Vuln'],
      hull_reinforce:    ['badge-orange', 'Hull RF'],
      hull_vulnerable:   ['badge-orange', 'Hull Vuln'],
      online_deprecated: ['badge-blue', 'Online'],
      onlining_vulnerable: ['badge-blue', 'Onlining'],
      anchoring_vulnerable: ['badge-muted', 'Anchoring'],
      unanchoring_vulnerable: ['badge-muted', 'Unanchoring'],
      unanchored: ['badge-muted', 'Unanchored'],
    };
    const [cls, label] = map[state] || ['badge-muted', state || '–'];
    return `<span class="badge ${cls}">${escHtml(label)}</span>`;
  }

  function posStateBadge(state) {
    const map = {
      online: 'badge-green',
      onlining: 'badge-blue',
      offline: 'badge-muted',
      reinforced: 'badge-orange',
      unanchoring: 'badge-muted',
    };
    return `<span class="badge ${map[state] || 'badge-muted'}">${escHtml(state || '–')}</span>`;
  }

  function fuelExpires(iso) {
    if (!iso) return '<span style="color:#475569">–</span>';
    const diff = new Date(iso) - Date.now();
    const days = Math.floor(diff / 86400000);
    const color = days < 3 ? '#f87171' : days < 7 ? '#fb923c' : '#94a3b8';
    return `<span style="color:${color}">${days < 0 ? 'Expired' : days + 'd'}</span>`;
  }

  async function togglePosDetail(idx, starbaseId, systemId) {
    const row = document.getElementById('pos-detail-' + idx);
    if (!row.classList.contains('hidden')) {
      row.classList.add('hidden');
      return;
    }
    const cell = row.querySelector('td');
    cell.innerHTML = '<span style="color:#475569">Loading…</span>';
    row.classList.remove('hidden');
    try {
      const r = await fetch(`/api/starbases/${starbaseId}?system_id=${systemId}`);
      if (!r.ok) {
        cell.innerHTML = '<span style="color:#f87171">Failed to load detail.</span>';
        return;
      }
      cell.innerHTML = renderPosDetail(await r.json());
    } catch {
      cell.innerHTML = '<span style="color:#f87171">Network error.</span>';
    }
  }

  function renderPosDetail(d) {
    const fuels = (d.fuels || []).map(f =>
      `<div style="display:flex;justify-content:space-between;font-size:0.8rem;color:#94a3b8;padding:0.2rem 0">
         <span>${escHtml(f.type_name || 'Type #' + f.type_id)}</span>
         <span style="color:#38bdf8">${fmtNum(f.quantity)}</span>
       </div>`).join('') || '<div style="color:#475569;font-size:0.8rem">No fuel data.</div>';

    const access = [
      ['Anchor', d.anchor],
      ['Unanchor', d.unanchor],
      ['Online', d.online],
      ['Offline', d.offline],
      ['Fuel View', d.fuel_bay_view],
      ['Fuel Take', d.fuel_bay_take],
    ].map(([k, v]) =>
      `<div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#94a3b8;padding:0.15rem 0">
         <span style="color:#64748b">${k}</span><span>${escHtml(v || '–')}</span>
       </div>`).join('');

    const flags = [
      d.allow_alliance_members && 'Alliance allowed',
      d.allow_corporation_members && 'Corp allowed',
      d.attack_if_at_war && 'Attack if at war',
      d.attack_if_other_security_status_dropping && 'Attack on sec drop',
    ].filter(Boolean).map(t =>
      `<span class="badge badge-muted" style="margin-right:0.3rem">${t}</span>`).join('');

    return `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
        <div>
          <div style="font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.5rem">Fuel Bay</div>
          ${fuels}
        </div>
        <div>
          <div style="font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.5rem">Access Control</div>
          ${access}
        </div>
      </div>
      <div style="margin-top:0.75rem">${flags}</div>`;
  }

  // ── Projects ──────────────────────────────────────────────────────────────

  let projectsTimer = null;

  async function loadProjects() {
    if (projectsTimer) clearTimeout(projectsTimer);
    try {
      const r = await fetch('/api/projects');
      if (!r.ok) {
        showError('projects-error', r.status === 403
          ? 'Insufficient corporation roles to view projects.'
          : 'ESI unavailable — projects could not be loaded.');
        return;
      }
      hideError('projects-error');
      renderProjects(await r.json());
    } catch {
      showError('projects-error', 'Network error — could not load projects.');
    }
    projectsTimer = setTimeout(loadProjects, 120000);
  }

  function showProjectTab(tab) {
    ['active', 'closed'].forEach(t => {
      document.getElementById('pane-' + t).classList.toggle('hidden', t !== tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
  }

  function renderProjects(data) {
    const { active = [], closed = [] } = data;
    document.getElementById('count-active').textContent = active.length;
    document.getElementById('count-closed').textContent = closed.length;
    document.getElementById('pane-active').innerHTML = projectListHtml(active, 'No active projects.');
    document.getElementById('pane-closed').innerHTML = projectListHtml(closed, 'No closed projects.');
  }

  function projectListHtml(projects, emptyMsg) {
    if (!projects.length) return `<p class="contract-empty">${emptyMsg}</p>`;
    return `<div class="layout">${projects.map(projectCard).join('')}</div>`;
  }

  function projectCard(p) {
    const cur = p.progress?.current ?? 0;
    const des = p.progress?.desired ?? 0;
    const pct = des > 0 ? Math.min(100, (cur / des) * 100) : 0;
    const reward = p.reward
      ? `<div class="metric">
           <div class="label">Reward Pool</div>
           <div class="val">${fmtISK(p.reward.remaining || 0)}<span class="unit">/ ${fmtISK(p.reward.initial || 0)} ISK</span></div>
         </div>`
      : '';
    return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:start;gap:0.5rem;margin-bottom:0.75rem">
          <div style="font-size:0.95rem;font-weight:600;color:#f8fafc">${escHtml(p.name)}</div>
          ${stateBadge(p.state)}
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>Progress</span>
            <span>${fmtNum(cur)} / ${fmtNum(des)}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        ${reward}
        <div style="margin-top:0.75rem;font-size:0.7rem;color:#475569">
          Last modified: ${new Date(p.last_modified).toLocaleDateString()}
        </div>
      </div>`;
  }

  function stateBadge(state) {
    const cls = {
      Active: 'badge-green',
      Completed: 'badge-blue',
      Closed: 'badge-muted',
      Expired: 'badge-orange',
    }[state] || 'badge-muted';
    return `<span class="badge ${cls}">${escHtml(state || '')}</span>`;
  }

  // ── Member ────────────────────────────────────────────────────────────────

  async function loadMember() {
    try {
      const r = await fetch('/api/member');
      if (!r.ok) {
        showError('member-error', 'ESI unavailable — member data could not be loaded.');
        return;
      }
      hideError('member-error');
      renderMember(await r.json());
    } catch {
      showError('member-error', 'Network error — could not load member data.');
    }
  }

  function renderMember(m) {
    const secStatColor = m.security_status >= 0 ? '#4ade80' : '#f87171';
    const secSign  = m.security_status >= 0 ? '+' : '';
    const trainingBadge = m.training_active
      ? '<span class="badge badge-green">Training</span>'
      : '<span class="badge badge-muted">Idle</span>';

    const onlineDot = m.online?.is_online
      ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;margin-right:0.4rem"></span>'
      : '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#475569;margin-right:0.4rem"></span>';
    const onlineLabel = m.online?.is_online ? 'Online' : 'Offline';

    const sysSec = m.location?.system_security;
    const sysSecText = (typeof sysSec === 'number')
      ? ` <span style="color:${secColor(sysSec)}">${sysSec.toFixed(1)}</span>` : '';
    const dockedRow = m.location?.docked_at
      ? `<div class="metric"><div class="label">Docked at</div>
           <div style="font-size:0.95rem;color:#e2e8f0;font-weight:600">${escHtml(m.location.docked_at)}</div>
         </div>`
      : `<div class="metric"><div class="label">Status</div>
           <div style="font-size:0.95rem;color:#94a3b8;font-weight:600">In Space</div>
         </div>`;

    document.getElementById('member-grid').innerHTML = `
      <div class="card">
        <div class="card-title">Character</div>
        <div class="char-card">
          <img class="char-portrait"
               src="https://images.evetech.net/characters/${m.character_id}/portrait?size=128" alt="">
          <div class="char-info">
            <div class="name">${escHtml(m.character_name)}</div>
            <div class="corp" id="corp-name-display">Corp ID: ${m.corporation_id}</div>
            <div class="sec-status" style="color:${secStatColor}">
              Security Status: ${secSign}${m.security_status.toFixed(1)}
            </div>
            <div style="font-size:0.8rem;color:#94a3b8;margin-top:0.4rem">
              ${onlineDot}${onlineLabel}
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Location &amp; Ship</div>
        <div class="metrics">
          <div class="metric">
            <div class="label">Solar System</div>
            <div style="font-size:0.95rem;color:#e2e8f0;font-weight:600">
              ${escHtml(m.location?.system_name || '–')}${sysSecText}
            </div>
          </div>
          ${dockedRow}
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem;
                    background:#252a3d;border-radius:8px;padding:0.6rem 0.75rem">
          ${m.ship?.type_id
            ? `<img src="https://images.evetech.net/types/${m.ship.type_id}/render?size=64"
                    alt="" style="width:48px;height:48px;border-radius:4px;background:#1e2130">`
            : ''}
          <div style="flex:1;min-width:0">
            <div style="font-size:0.7rem;color:#475569;text-transform:uppercase;letter-spacing:0.06em">
              Active Ship
            </div>
            <div style="font-size:0.9rem;color:#e2e8f0;font-weight:600;
                        white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${escHtml(m.ship?.name || '–')}
            </div>
            <div style="font-size:0.75rem;color:#94a3b8">
              ${escHtml(m.ship?.type_name || '')}
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Financials &amp; Skills</div>
        <div class="metrics">
          <div class="metric">
            <div class="label">Wallet Balance</div>
            <div class="val">${fmtISK(m.wallet_balance)}<span class="unit">ISK</span></div>
          </div>
          <div class="metric">
            <div class="label">Total Skillpoints</div>
            <div class="val">${fmtSP(m.total_sp)}<span class="unit">SP</span></div>
          </div>
        </div>
        <div style="margin-top:0.75rem;font-size:0.75rem;color:#64748b;
                    text-transform:uppercase;letter-spacing:0.06em">
          Skill Queue &nbsp; ${trainingBadge}
        </div>
        <div style="margin-top:0.75rem;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;
                    font-size:0.7rem;color:#64748b">
          <div>
            <div style="text-transform:uppercase;letter-spacing:0.06em">Last Login</div>
            <div style="color:#94a3b8;font-size:0.8rem;margin-top:0.15rem">
              ${m.online?.last_login ? new Date(m.online.last_login).toLocaleString() : '–'}
            </div>
          </div>
          <div>
            <div style="text-transform:uppercase;letter-spacing:0.06em">Total Logins</div>
            <div style="color:#94a3b8;font-size:0.8rem;margin-top:0.15rem">
              ${m.online?.logins != null ? fmtNum(m.online.logins) : '–'}
            </div>
          </div>
        </div>
      </div>`;

    fetch(`https://esi.evetech.net/latest/corporations/${m.corporation_id}/`)
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById('corp-name-display');
        if (el && d.name) el.textContent = d.name;
      })
      .catch(() => {});
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function fmtISK(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(2) + 'M';
    return new Intl.NumberFormat().format(Math.round(n));
  }

  function fmtSP(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
    return String(n);
  }

  function fmtNum(n) { return new Intl.NumberFormat().format(n); }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError(id) {
    document.getElementById(id).classList.remove('show');
  }

  boot();
</script>
</body>
</html>
