<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupa Operacyjna ZLY CHUJI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'Segoe UI Symbol', 'Apple Symbols',
                   'Noto Sans Symbols 2', 'Noto Sans Symbols',
                   sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: #1e2130;
      border-bottom: 1px solid #2d3348;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-corp { font-weight: 700; font-size: 1rem; color: #f8fafc; letter-spacing: 0.03em; }

    .nav-links { display: flex; gap: 0.25rem; }

    .nav-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .nav-btn:hover { color: #e2e8f0; background: #252a3d; }
    .nav-btn.active { color: #38bdf8; background: #0c2233; }

    .nav-right { display: flex; align-items: center; gap: 0.75rem; }

    .tq-status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: #94a3b8;
      padding: 0.25rem 0.55rem;
      background: #252a3d;
      border-radius: 6px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .tq-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }
    .tq-dot.tq-online {
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74, 222, 128, 0.6);
    }
    .tq-dot.tq-offline { background: #f87171; }
    .tq-dot.tq-vip {
      background: #fb923c;
      box-shadow: 0 0 6px rgba(251, 146, 60, 0.6);
    }
    .tq-count { color: #38bdf8; font-variant-numeric: tabular-nums; }

    .nav-wallet {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: #94a3b8;
      padding: 0.25rem 0.55rem;
      background: #252a3d;
      border-radius: 6px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .nav-wallet .nw-label { color: #475569; }
    .nav-wallet .nw-val   { color: #38bdf8; font-variant-numeric: tabular-nums; }

    .nav-char { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #94a3b8; }

    .nav-portrait {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid #2d3348;
      background: #252a3d;
    }

    .btn-logout {
      background: none;
      border: 1px solid #2d3348;
      color: #64748b;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-logout:hover { color: #f87171; border-color: #f87171; }

    /* ── Layout ── */
    main { padding: 2rem; }

    .layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.25rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 1.5rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Cards ── */
    .card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card.full { grid-column: 1 / -1; }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    /* ── Metric ── */
    .metric {
      background: #252a3d;
      border-radius: 8px;
      padding: 0.9rem 1rem;
    }

    .metric .label {
      font-size: 0.7rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }

    .metric .val {
      font-size: 1.4rem;
      font-weight: 700;
      color: #38bdf8;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .metric .val.val-sm { font-size: 1.15rem; }
    .metric .val.val-xs { font-size: 0.95rem; }
    .metric .unit { font-size: 0.7rem; color: #475569; margin-left: 0.25rem; }

    /* ── Progress ── */
    .progress-wrap { margin-top: 0.5rem; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.35rem;
    }

    .progress-bar {
      height: 6px;
      background: #252a3d;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #38bdf8;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      border-radius: 4px;
      padding: 0.1rem 0.45rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-blue   { background: #0c2233; color: #38bdf8; }
    .badge-green  { background: #052e16; color: #4ade80; }
    .badge-muted  { background: #1e2130; color: #475569; border: 1px solid #2d3348; }
    .badge-orange { background: #2d1a00; color: #fb923c; }
    .badge-red    { background: #450a0a; color: #fca5a5; }

    .card-warn {
      border-color: #ef4444;
      box-shadow: 0 0 0 1px #ef4444, 0 0 12px rgba(239, 68, 68, 0.2);
    }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 0.75rem; }

    th {
      text-align: left;
      padding: 0.4rem 0.6rem;
      color: #475569;
      font-weight: 500;
      font-size: 0.72rem;
      border-bottom: 1px solid #2d3348;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }
    th.sortable:hover { color: #94a3b8; }
    th.sortable .sort-arrow {
      display: inline-block;
      margin-left: 0.2rem;
      color: #475569;
      font-size: 0.65rem;
    }
    th.sort-active { color: #38bdf8; }
    th.sort-active .sort-arrow { color: #38bdf8; }

    td { padding: 0.6rem 0.6rem; border-bottom: 1px solid #1a1e2e; color: #94a3b8; }
    tr:last-child td { border-bottom: none; }

    /* ── Character card ── */
    .char-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .char-portrait {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      border: 1px solid #2d3348;
      background: #252a3d;
    }

    .char-info .name { font-size: 1.1rem; font-weight: 700; color: #f8fafc; }
    .char-info .corp { font-size: 0.8rem; color: #64748b; margin-top: 0.2rem; }

    .sec-status {
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 0.4rem;
    }

    /* ── Metrics grid ── */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem; }

    /* ── Banner ── */
    .banner {
      background: #450a0a;
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 1.25rem;
      color: #fca5a5;
      font-size: 0.8rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      display: none;
    }

    .banner.show { display: block; }

    /* ── Login view ── */
    #view-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .login-corp {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.4rem;
    }

    .login-sub {
      font-size: 0.8rem;
      color: #475569;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #0c2233;
      border: 1px solid #38bdf8;
      border-radius: 8px;
      color: #38bdf8;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }

    .login-btn:hover {
      background: #38bdf8;
      color: #0f1117;
    }

    .login-btn:active { transform: translateY(1px); }

    .login-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Spinner ── */
    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #475569;
      font-size: 0.85rem;
    }

    /* ── Contract tabs ── */
    .tab-strip {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.25rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      border-bottom: 1px solid #2d3348;
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      color: #64748b;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active { color: #38bdf8; border-bottom-color: #38bdf8; }

    .tab-count {
      background: #252a3d;
      color: #475569;
      border-radius: 4px;
      padding: 0.05rem 0.35rem;
      font-size: 0.65rem;
      margin-left: 0.3rem;
      font-weight: 700;
    }

    .tab-btn.active .tab-count { background: #0c2233; color: #38bdf8; }

    .contract-pane { max-width: 1200px; margin: 0 auto; }

    .contract-empty { color: #475569; font-size: 0.85rem; padding: 1rem 0; }

    /* ── Open in EVE button ── */
    .btn-ingame {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: #252a3d;
      border: 1px solid #2d3348;
      border-radius: 4px;
      color: #64748b;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      font-size: 0.85rem;
      padding: 0;
    }
    .btn-ingame:hover { color: #38bdf8; border-color: #38bdf8; background: #0c2233; }
    .btn-ingame:active { transform: translateY(1px); }
    .btn-ingame.btn-ok { color: #4ade80; border-color: #4ade80; }
    .btn-ingame.btn-fail { color: #f87171; border-color: #f87171; }
    .btn-ingame svg { width: 14px; height: 14px; }

    /* ── Skeleton loading ── */
    .skeleton {
      background: linear-gradient(90deg, #1e2130 0%, #252a3d 50%, #1e2130 100%);
      background-size: 200% 100%;
      animation: skeleton 1.4s ease-in-out infinite;
      border-radius: 4px;
      color: transparent;
    }
    @keyframes skeleton {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .card-error {
      color: #fca5a5;
      background: #2a0d0d;
      border: 1px solid #ef4444;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
    }

    /* ── Personal contracts list ── */
    tr.pc-critical { background: rgba(239, 68, 68, 0.04); }
    tr.pc-done     { opacity: 0.55; }
    td.pc-priority-cell {
      border-left: 3px solid #2d3348;
      padding-left: 0.6rem !important;
    }
    tr.pc-critical td.pc-priority-cell { border-left-color: #ef4444; }
    tr.pc-warning  td.pc-priority-cell { border-left-color: #fb923c; }
    tr.pc-ok       td.pc-priority-cell { border-left-color: #4ade80; }
    .pc-empty { color: #475569; font-size: 0.85rem; padding: 0.75rem 0; text-align: center; }

    /* ── System links ── */
    .sys-link {
      display: inline-flex;
      gap: 0.25rem;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .sys-link a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: #252a3d;
      border-radius: 3px;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }

    .sys-link a:hover { background: #38bdf8; }
    .sys-link a:active { transform: translateY(1px); }
    .sys-link img { width: 12px; height: 12px; display: block; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      animation: fade-in 0.15s ease-out;
    }
    @keyframes fade-in { from { opacity: 0 } to { opacity: 1 } }

    .modal {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      width: 100%;
      max-width: 640px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #2d3348;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .modal-header h3 {
      color: #f8fafc;
      font-size: 1rem;
      font-weight: 600;
      margin: 0;
    }
    .modal-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .modal-close:hover { color: #f87171; background: #252a3d; }
    .modal-body {
      padding: 1rem 1.25rem;
      overflow-y: auto;
      flex: 1;
    }

    .card.project-clickable {
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card.project-clickable:hover { border-color: #38bdf8; }
    .card.project-clickable:active { transform: translateY(1px); }

    .proj-sort-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      flex-wrap: wrap;
    }
    .proj-sort-label {
      color: #475569;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 0.3rem;
    }
    .proj-sort-btn {
      background: none;
      border: 1px solid #2d3348;
      color: #94a3b8;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .proj-sort-btn:hover { color: #e2e8f0; border-color: #475569; }
    .proj-sort-btn.active { color: #38bdf8; border-color: #38bdf8; background: #0c2233; }
    .proj-sort-arrow { margin-left: 0.25rem; font-size: 0.65rem; }

    .badge-purple { background: #1e1633; color: #c4b5fd; }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Loading spinner -->
<div id="view-loading" class="spinner">Loading…</div>

<!-- Login view -->
<div id="view-login" class="hidden">
  <div class="login-card">
    <div class="login-corp">Grupa Operacyjna</div>
    <div class="login-corp" style="color:#38bdf8">ZLY CHUJI</div>
    <div class="login-sub">Corporation Portal · Members Only</div>
    <a href="/api/auth/login" class="login-btn">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2L4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4zm0 2.2L18 7v5c0 4-2.7 7.7-6 8.2-3.3-.5-6-4.2-6-8.2V7l6-2.8z"/>
      </svg>
      Log in with EVE Online
    </a>
  </div>
</div>

<!-- Modal -->
<div id="modal-backdrop" class="modal-backdrop hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- App shell (shown when authenticated) -->
<div id="view-app" class="hidden">

  <nav>
    <span class="nav-corp">ZLY CHUJI</span>
    <div class="nav-links">
      <button class="nav-btn active" id="btn-contracts" onclick="showView('contracts')">Contracts</button>
      <button class="nav-btn" id="btn-projects" onclick="showView('projects')">Projects</button>
      <button class="nav-btn hidden" id="btn-structures" onclick="showView('structures')">Structures</button>
      <button class="nav-btn" id="btn-member" onclick="showView('member')">Member</button>
      <button class="nav-btn hidden" id="btn-admin" onclick="showView('admin')">Admin</button>
    </div>
    <div class="nav-right">
      <div class="tq-status" id="tq-status" title="EVE Tranquility status">
        <span class="tq-dot"></span><span>TQ</span>
      </div>
      <div class="nav-wallet hidden" id="nav-wallet" title="Wallet balance">
        <span class="nw-label">ISK</span><span class="nw-val">–</span>
      </div>
      <div class="nav-char">
        <img id="nav-portrait" class="nav-portrait" src="" alt="">
        <span id="nav-name"></span>
      </div>
      <a href="/api/auth/logout" class="btn-logout">Logout</a>
    </div>
  </nav>

  <main>
    <!-- Contracts view -->
    <div id="view-contracts">
      <div id="contracts-error" class="banner"></div>
      <div class="page-title">Corporation Contracts</div>
      <div class="tab-strip">
        <button class="tab-btn active" id="tab-hauling" onclick="showContractTab('hauling')">
          Hauling <span class="tab-count" id="count-hauling">0</span>
        </button>
        <button class="tab-btn" id="tab-abyssal" onclick="showContractTab('abyssal')">
          Abyssal <span class="tab-count" id="count-abyssal">0</span>
        </button>
        <button class="tab-btn" id="tab-others" onclick="showContractTab('others')">
          Other <span class="tab-count" id="count-others">0</span>
        </button>
      </div>
      <div id="pane-hauling" class="contract-pane"></div>
      <div id="pane-abyssal" class="contract-pane hidden"></div>
      <div id="pane-others"  class="contract-pane hidden"></div>
    </div>

    <!-- Projects view -->
    <div id="view-projects" class="hidden">
      <div id="projects-error" class="banner"></div>
      <div class="page-title">Corporation Projects</div>
      <div class="tab-strip">
        <button class="tab-btn active" id="tab-active" onclick="showProjectTab('active')">
          Active <span class="tab-count" id="count-active">0</span>
        </button>
        <button class="tab-btn" id="tab-closed" onclick="showProjectTab('closed')">
          Closed <span class="tab-count" id="count-closed">0</span>
        </button>
      </div>
      <div class="proj-sort-bar">
        <span class="proj-sort-label">Sort by</span>
        <button class="proj-sort-btn" id="proj-sort-priority" onclick="setProjectSort('priority')">Priority</button>
        <button class="proj-sort-btn" id="proj-sort-name"     onclick="setProjectSort('name')">Name</button>
        <button class="proj-sort-btn" id="proj-sort-progress" onclick="setProjectSort('progress')">Progress</button>
        <button class="proj-sort-btn" id="proj-sort-value"    onclick="setProjectSort('value')">Value</button>
      </div>
      <div id="pane-active" class="contract-pane"></div>
      <div id="pane-closed" class="contract-pane hidden"></div>
    </div>

    <!-- Structures view -->
    <div id="view-structures" class="hidden">
      <div id="structures-error" class="banner"></div>
      <div class="page-title">Corporation Structures</div>
      <div class="tab-strip">
        <button class="tab-btn active" id="tab-citadels" onclick="showStructuresTab('citadels')">
          Citadels <span class="tab-count" id="count-citadels">0</span>
        </button>
        <button class="tab-btn" id="tab-poses" onclick="showStructuresTab('poses')">
          POSes <span class="tab-count" id="count-poses">0</span>
        </button>
      </div>
      <div id="pane-citadels" class="contract-pane"></div>
      <div id="pane-poses" class="contract-pane hidden"></div>
    </div>

    <!-- Admin view -->
    <div id="view-admin" class="hidden">
      <div id="admin-error" class="banner"></div>
      <div class="page-title">Administration</div>
      <div id="admin-caches" class="contract-pane" style="margin-bottom:1.5rem"></div>
      <div id="admin-content" class="contract-pane"></div>
    </div>

    <!-- Member view -->
    <div id="view-member" class="hidden">
      <div id="member-error" class="banner"></div>
      <div class="page-title">Member Profile</div>
      <div id="member-grid" class="layout"></div>
    </div>
  </main>

</div>

<script>
  let currentUser = null;
  let contractsTimer = null;
  let contractsData = null;
  const sortState = {
    hauling: { col: null, dir: 'desc' },
    abyssal: { col: null, dir: 'desc' },
    others:  { col: null, dir: 'desc' },
  };
  const numericSortCols = new Set(['volume', 'reward', 'collateral', 'price', 'buyout', 'expires']);

  // ── Boot ──────────────────────────────────────────────────────────────────

  async function boot() {
    try {
      const r = await fetch('/api/auth/me');
      if (r.status === 401) { show('view-login'); return; }
      currentUser = await r.json();
      document.getElementById('nav-portrait').src =
        `https://images.evetech.net/characters/${currentUser.character_id}/portrait?size=64`;
      document.getElementById('nav-name').textContent = currentUser.character_name;
      if (currentUser.is_admin) {
        document.getElementById('btn-admin').classList.remove('hidden');
      }
      show('view-app');
      showView('contracts');
      pollServerStatus();
      pollWallet();
    } catch { show('view-login'); }
  }

  async function pollWallet() {
    try {
      const r = await fetch('/api/me/wallet');
      if (r.ok) {
        const d = await r.json();
        renderNavWallet(d.balance);
      }
    } catch {}
    setTimeout(pollWallet, 90000);
  }

  function renderNavWallet(balance) {
    const el = document.getElementById('nav-wallet');
    if (!el || balance == null) return;
    el.classList.remove('hidden');
    el.querySelector('.nw-val').textContent = fmtISKLong(balance);
    el.title = `Wallet: ${new Intl.NumberFormat().format(Math.round(balance))} ISK`;
  }

  async function pollServerStatus() {
    try {
      const r = await fetch('/api/status');
      renderServerStatus(r.ok ? await r.json() : null);
    } catch { renderServerStatus(null); }
    setTimeout(pollServerStatus, 60000);
  }

  function renderServerStatus(s) {
    const el = document.getElementById('tq-status');
    if (!el) return;
    if (!s || !s.online) {
      el.innerHTML = '<span class="tq-dot tq-offline"></span><span>TQ down</span>';
      el.title = 'EVE Tranquility unreachable';
      return;
    }
    if (s.vip) {
      el.innerHTML = '<span class="tq-dot tq-vip"></span><span>TQ VIP</span>';
      el.title = 'VIP mode — limited access';
      return;
    }
    const count = s.players != null ? fmtNum(s.players) : '?';
    el.innerHTML = `<span class="tq-dot tq-online"></span>
                    <span>TQ</span>
                    <span class="tq-count">${count}</span>`;
    el.title = `Tranquility online · ${count} pilots · ${s.version || ''}`;
  }

  // ── View switching ────────────────────────────────────────────────────────

  function show(id) {
    ['view-loading', 'view-login', 'view-app'].forEach(v =>
      document.getElementById(v).classList.toggle('hidden', v !== id)
    );
  }

  function showView(view) {
    ['contracts', 'projects', 'structures', 'member', 'admin'].forEach(v => {
      document.getElementById('view-' + v).classList.toggle('hidden', view !== v);
      document.getElementById('btn-' + v).classList.toggle('active', view === v);
    });
    if (view === 'contracts') loadContracts();
    if (view === 'projects') loadProjects();
    if (view === 'structures') loadStructures();
    if (view === 'member') loadMember();
    if (view === 'admin') loadAdmin();
  }

  // ── Contracts ─────────────────────────────────────────────────────────────

  async function loadContracts() {
    if (contractsTimer) clearTimeout(contractsTimer);
    try {
      const r = await fetch('/api/contracts');
      if (!r.ok) {
        showError('contracts-error', r.status === 403
          ? 'Insufficient corporation roles to view contracts.'
          : 'ESI unavailable — contracts could not be loaded.');
        return;
      }
      hideError('contracts-error');
      renderContracts(await r.json());
    } catch {
      showError('contracts-error', 'Network error — could not load contracts.');
    }
    contractsTimer = setTimeout(loadContracts, 120000);
  }

  function showContractTab(tab) {
    ['hauling', 'abyssal', 'others'].forEach(t => {
      document.getElementById('pane-' + t).classList.toggle('hidden', t !== tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
  }

  function timeLeft(iso) {
    if (!iso) return '–';
    const diff = new Date(iso) - Date.now();
    if (diff <= 0) return 'Expired';
    const h = Math.floor(diff / 3600000);
    if (h < 1) return '<1h';
    if (h < 24) return h + 'h';
    return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
  }

  function statusBadge(s) {
    if (s === 'in_progress') return '<span class="badge badge-green">In Progress</span>';
    return '<span class="badge badge-blue">Outstanding</span>';
  }

  function contractSortVal(c, col) {
    switch (col) {
      case 'route':      return ((c.start_name || '') + ' → ' + (c.end_name || '')).toLowerCase();
      case 'volume':     return c.volume     || 0;
      case 'reward':     return c.reward     || 0;
      case 'collateral': return c.collateral || 0;
      case 'price':      return c.price      || 0;
      case 'buyout':     return c.buyout     || 0;
      case 'hauler':     return (c.acceptor_name || '').toLowerCase();
      case 'title':      return (c.title || '').toLowerCase();
      case 'type':       return (c.type || '').toLowerCase();
      case 'status':     return (c.status || '').toLowerCase();
      case 'expires':    return c.date_expired ? new Date(c.date_expired).getTime() : 0;
      default:           return 0;
    }
  }

  function sortContracts(list, table) {
    const { col, dir } = sortState[table];
    if (!col) return list;
    const sorted = [...list].sort((a, b) => {
      const va = contractSortVal(a, col);
      const vb = contractSortVal(b, col);
      if (va < vb) return -1;
      if (va > vb) return 1;
      return 0;
    });
    return dir === 'desc' ? sorted.reverse() : sorted;
  }

  function setContractSort(table, col) {
    const s = sortState[table];
    if (s.col === col) {
      s.dir = s.dir === 'asc' ? 'desc' : 'asc';
    } else {
      s.col = col;
      s.dir = numericSortCols.has(col) ? 'desc' : 'asc';
    }
    if (contractsData) renderContracts(contractsData);
  }

  function sortableTh(table, col, label) {
    const s = sortState[table];
    const active = s.col === col;
    const arrow = active ? (s.dir === 'asc' ? '▲' : '▼') : '↕';
    const cls = 'sortable' + (active ? ' sort-active' : '');
    return `<th class="${cls}" onclick="setContractSort('${table}','${col}')">${label}<span class="sort-arrow">${arrow}</span></th>`;
  }

  function renderContracts(data) {
    contractsData = data;
    const hauling = sortContracts(data.hauling || [], 'hauling');
    const abyssal = sortContracts(data.abyssal || [], 'abyssal');
    const others  = sortContracts(data.others  || [], 'others');

    document.getElementById('count-hauling').textContent = hauling.length;
    document.getElementById('count-abyssal').textContent = abyssal.length;
    document.getElementById('count-others').textContent  = others.length;

    // ── Hauling ──
    document.getElementById('pane-hauling').innerHTML = hauling.length ? `
      <div class="card full">
        <table>
          <thead><tr>
            ${sortableTh('hauling','route','Route')}
            ${sortableTh('hauling','volume','Volume')}
            ${sortableTh('hauling','reward','Reward')}
            ${sortableTh('hauling','collateral','Collateral')}
            ${sortableTh('hauling','hauler','Hauler')}
            ${sortableTh('hauling','status','Status')}
            ${sortableTh('hauling','expires','Expires')}
            <th></th>
          </tr></thead>
          <tbody>
            ${hauling.map(c => `
              <tr>
                <td style="color:#e2e8f0">
                  ${locWithType(c.start_name, c.start_type, c.start_system_name, c.start_system_id)}
                  <span style="color:#475569"> → </span>
                  ${locWithType(c.end_name, c.end_type, c.end_system_name, c.end_system_id)}
                  ${issuerLine(c)}
                </td>
                <td>${fmtNum(Math.round(c.volume || 0))} m³</td>
                <td style="color:#38bdf8">${fmtISK(c.reward || 0)} ISK</td>
                <td>${fmtISK(c.collateral || 0)} ISK</td>
                <td>${haulerCell(c)}</td>
                <td>${statusBadge(c.status)}</td>
                <td>${timeLeft(c.date_expired)}</td>
                <td>${openInEveBtn(c.contract_id)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<p class="contract-empty">No active hauling contracts.</p>';

    // ── Abyssal / Auction ──
    document.getElementById('pane-abyssal').innerHTML = abyssal.length ? `
      <div class="card full">
        <table>
          <thead><tr>
            ${sortableTh('abyssal','title','Title')}
            ${sortableTh('abyssal','price','Starting Bid')}
            ${sortableTh('abyssal','buyout','Buyout')}
            ${sortableTh('abyssal','status','Status')}
            ${sortableTh('abyssal','expires','Ends')}
            <th></th>
          </tr></thead>
          <tbody>
            ${abyssal.map(c => `
              <tr>
                <td style="color:#e2e8f0">
                  ${escHtml(c.title || 'Auction #' + c.contract_id)}
                  ${issuerLine(c)}
                </td>
                <td style="color:#38bdf8">${fmtISK(c.price || 0)} ISK</td>
                <td>${c.buyout ? fmtISK(c.buyout) + ' ISK' : '<span style="color:#475569">–</span>'}</td>
                <td>${statusBadge(c.status)}</td>
                <td>${timeLeft(c.date_expired)}</td>
                <td>${openInEveBtn(c.contract_id)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<p class="contract-empty">No active abyssal auctions.</p>';

    // ── Others ──
    const typeLabel = t => ({ item_exchange: 'Item Exchange', courier: 'Courier',
      auction: 'Auction', loan: 'Loan' }[t] || t || 'Unknown');

    document.getElementById('pane-others').innerHTML = others.length ? `
      <div class="card full">
        <table>
          <thead><tr>
            ${sortableTh('others','title','Title')}
            ${sortableTh('others','type','Type')}
            ${sortableTh('others','price','Price')}
            ${sortableTh('others','hauler','Accepted by')}
            ${sortableTh('others','status','Status')}
            ${sortableTh('others','expires','Expires')}
            <th></th>
          </tr></thead>
          <tbody>
            ${others.map(c => `
              <tr>
                <td style="color:#e2e8f0">
                  ${escHtml(c.title || 'Contract #' + c.contract_id)}
                  ${issuerLine(c)}
                </td>
                <td><span class="badge badge-muted">${typeLabel(c.type)}</span></td>
                <td>${c.price ? fmtISK(c.price) + ' ISK' : '<span style="color:#475569">–</span>'}</td>
                <td>${haulerCell(c)}</td>
                <td>${statusBadge(c.status)}</td>
                <td>${timeLeft(c.date_expired)}</td>
                <td>${openInEveBtn(c.contract_id)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<p class="contract-empty">No other active contracts.</p>';
  }

  function issuerLine(c) {
    if (!c.issuer_name) return '';
    return `<div style="font-size:0.7rem;color:#475569;margin-top:0.2rem">
              by ${escHtml(c.issuer_name)}
            </div>`;
  }

  function haulerCell(c) {
    if (c.acceptor_name) {
      const accepted = c.date_accepted
        ? `<div style="font-size:0.65rem;color:#475569;margin-top:0.15rem">
             ${new Date(c.date_accepted).toLocaleDateString()}
           </div>`
        : '';
      return `<span style="color:#4ade80">${escHtml(c.acceptor_name)}</span>${accepted}`;
    }
    return '<span style="color:#475569">–</span>';
  }

  function openInEveBtn(contractId) {
    return `<button class="btn-ingame" onclick="openContractInEve(this, ${contractId})"
                    title="Open in EVE client" aria-label="Open in EVE">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h6v6"/><path d="M10 14L21 3"/>
        <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/>
      </svg>
    </button>`;
  }

  async function openContractInEve(btn, contractId) {
    btn.disabled = true;
    btn.classList.remove('btn-ok', 'btn-fail');
    try {
      const r = await fetch(`/api/ui/open-contract/${contractId}`, { method: 'POST' });
      if (!r.ok) {
        const detail = await r.json().catch(() => ({}));
        btn.classList.add('btn-fail');
        btn.title = detail.detail || `Failed (${r.status})`;
      } else {
        btn.classList.add('btn-ok');
        btn.title = 'Sent to EVE client';
      }
    } catch {
      btn.classList.add('btn-fail');
      btn.title = 'Network error';
    }
    setTimeout(() => {
      btn.classList.remove('btn-ok', 'btn-fail');
      btn.disabled = false;
      btn.title = 'Open in EVE client';
    }, 2500);
  }

  function shortLoc(name) {
    if (!name) return '–';
    // Shorten "Jita IV - Moon 4 - Caldari Navy Assembly Plant" → "Jita IV - Moon 4"
    const parts = name.split(' - ');
    return parts.length > 2 ? parts.slice(0, 2).join(' - ') : name;
  }

  function locWithType(name, type, sysName, sysId) {
    const typeBadge = type
      ? ` <span class="badge badge-muted" style="margin-left:0.25rem">${escHtml(type)}</span>`
      : '';
    return escHtml(shortLoc(name)) + typeBadge + systemLinks(sysName, sysId);
  }

  function characterZkillLink(id) {
    if (!id) return '';
    return `<span class="sys-link" style="margin-left:0">
      <a href="https://zkillboard.com/character/${id}/" target="_blank" rel="noopener" title="zKillboard">
        <img src="https://www.google.com/s2/favicons?sz=32&domain=zkillboard.com" alt="zK">
      </a>
    </span>`;
  }

  function systemLinks(name, id) {
    if (!id || !name) return '';
    return `<span class="sys-link">
      <a href="https://zkillboard.com/system/${id}/" target="_blank" rel="noopener" title="zKillboard">
        <img src="https://www.google.com/s2/favicons?sz=32&domain=zkillboard.com" alt="zK">
      </a>
      <a href="https://evemaps.dotlan.net/system/${encodeURIComponent(name)}" target="_blank" rel="noopener" title="Dotlan">
        <img src="https://www.google.com/s2/favicons?sz=32&domain=evemaps.dotlan.net" alt="DT">
      </a>
    </span>`;
  }

  // ── Structures ────────────────────────────────────────────────────────────

  async function loadStructures() {
    try {
      const r = await fetch('/api/structures');
      if (!r.ok) {
        showError('structures-error', r.status === 403
          ? 'Insufficient corporation roles to view structures.'
          : 'ESI unavailable — structures could not be loaded.');
        return;
      }
      hideError('structures-error');
      const data = await r.json();
      if (data.limited_mode) {
        showError('structures-error',
          'Limited view: full structure list requires Director or Station Manager role. ' +
          'Showing only citadels seen by your account; live state and fuel data hidden.');
        document.getElementById('structures-error').style.background = '#2d1a00';
        document.getElementById('structures-error').style.borderColor = '#fb923c';
        document.getElementById('structures-error').style.color = '#fcd34d';
      } else {
        document.getElementById('structures-error').style.background = '';
        document.getElementById('structures-error').style.borderColor = '';
        document.getElementById('structures-error').style.color = '';
      }
      renderStructures(data);
    } catch {
      showError('structures-error', 'Network error — could not load structures.');
    }
  }

  function showStructuresTab(tab) {
    ['citadels', 'poses'].forEach(t => {
      document.getElementById('pane-' + t).classList.toggle('hidden', t !== tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
  }

  function renderStructures(data) {
    const { citadels = [], starbases = [] } = data;
    document.getElementById('count-citadels').textContent = citadels.length;
    document.getElementById('count-poses').textContent = starbases.length;
    document.getElementById('pane-citadels').innerHTML = citadelsTable(citadels);
    document.getElementById('pane-poses').innerHTML = posesTable(starbases);
  }

  function citadelsTable(list) {
    if (!list.length) return '<p class="contract-empty">No citadels.</p>';
    return `
      <div class="card full">
        <table>
          <thead><tr>
            <th>Name</th><th>Type</th><th>System</th><th>State</th><th>Fuel Expires</th>
          </tr></thead>
          <tbody>
            ${list.map(s => `
              <tr>
                <td style="color:#e2e8f0">${escHtml(s.name || ('Citadel #' + (s.structure_id || '')))}</td>
                <td><span class="badge badge-blue">${escHtml(s.type_name || '–')}</span></td>
                <td>${systemCell(s)}</td>
                <td>${citadelStateBadge(s.state)}</td>
                <td>${fuelExpires(s.fuel_expires)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function posesTable(list) {
    if (!list.length) return '<p class="contract-empty">No POSes.</p>';
    return `
      <div class="card full">
        <table>
          <thead><tr>
            <th>Type</th><th>System</th><th>State</th><th>Online Since</th><th></th>
          </tr></thead>
          <tbody>
            ${list.map((s, i) => `
              <tr id="pos-row-${i}" style="cursor:pointer" onclick="togglePosDetail(${i}, ${s.starbase_id}, ${s.system_id})">
                <td style="color:#e2e8f0">${escHtml(s.type_name || ('Type #' + (s.type_id || '')))}</td>
                <td>${systemCell(s)}</td>
                <td>${posStateBadge(s.state)}</td>
                <td>${s.onlined_since ? new Date(s.onlined_since).toLocaleDateString() : '–'}</td>
                <td style="color:#475569;font-size:0.7rem">▼</td>
              </tr>
              <tr id="pos-detail-${i}" class="hidden"><td colspan="5" style="background:#181b27;padding:0.75rem"></td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function systemCell(s) {
    const sec = (typeof s.security_status === 'number') ? ` <span style="color:${secColor(s.security_status)}">${s.security_status.toFixed(1)}</span>` : '';
    return `${escHtml(s.system_name || 'System #' + (s.system_id || ''))}${sec}${systemLinks(s.system_name, s.system_id)}`;
  }

  function secColor(v) {
    if (v >= 0.5) return '#4ade80';
    if (v >  0.0) return '#fb923c';
    return '#f87171';
  }

  function citadelStateBadge(state) {
    const map = {
      shield_vulnerable: ['badge-green', 'Vulnerable'],
      armor_reinforce:   ['badge-orange', 'Armor RF'],
      armor_vulnerable:  ['badge-orange', 'Armor Vuln'],
      hull_reinforce:    ['badge-orange', 'Hull RF'],
      hull_vulnerable:   ['badge-orange', 'Hull Vuln'],
      online_deprecated: ['badge-blue', 'Online'],
      onlining_vulnerable: ['badge-blue', 'Onlining'],
      anchoring_vulnerable: ['badge-muted', 'Anchoring'],
      unanchoring_vulnerable: ['badge-muted', 'Unanchoring'],
      unanchored: ['badge-muted', 'Unanchored'],
    };
    const [cls, label] = map[state] || ['badge-muted', state || '–'];
    return `<span class="badge ${cls}">${escHtml(label)}</span>`;
  }

  function posStateBadge(state) {
    const map = {
      online: 'badge-green',
      onlining: 'badge-blue',
      offline: 'badge-muted',
      reinforced: 'badge-orange',
      unanchoring: 'badge-muted',
    };
    return `<span class="badge ${map[state] || 'badge-muted'}">${escHtml(state || '–')}</span>`;
  }

  function fuelExpires(iso) {
    if (!iso) return '<span style="color:#475569">–</span>';
    const diff = new Date(iso) - Date.now();
    const days = Math.floor(diff / 86400000);
    const color = days < 3 ? '#f87171' : days < 7 ? '#fb923c' : '#94a3b8';
    return `<span style="color:${color}">${days < 0 ? 'Expired' : days + 'd'}</span>`;
  }

  async function togglePosDetail(idx, starbaseId, systemId) {
    const row = document.getElementById('pos-detail-' + idx);
    if (!row.classList.contains('hidden')) {
      row.classList.add('hidden');
      return;
    }
    const cell = row.querySelector('td');
    cell.innerHTML = '<span style="color:#475569">Loading…</span>';
    row.classList.remove('hidden');
    try {
      const r = await fetch(`/api/starbases/${starbaseId}?system_id=${systemId}`);
      if (!r.ok) {
        cell.innerHTML = '<span style="color:#f87171">Failed to load detail.</span>';
        return;
      }
      cell.innerHTML = renderPosDetail(await r.json());
    } catch {
      cell.innerHTML = '<span style="color:#f87171">Network error.</span>';
    }
  }

  function renderPosDetail(d) {
    const fuels = (d.fuels || []).map(f =>
      `<div style="display:flex;justify-content:space-between;font-size:0.8rem;color:#94a3b8;padding:0.2rem 0">
         <span>${escHtml(f.type_name || 'Type #' + f.type_id)}</span>
         <span style="color:#38bdf8">${fmtNum(f.quantity)}</span>
       </div>`).join('') || '<div style="color:#475569;font-size:0.8rem">No fuel data.</div>';

    const access = [
      ['Anchor', d.anchor],
      ['Unanchor', d.unanchor],
      ['Online', d.online],
      ['Offline', d.offline],
      ['Fuel View', d.fuel_bay_view],
      ['Fuel Take', d.fuel_bay_take],
    ].map(([k, v]) =>
      `<div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#94a3b8;padding:0.15rem 0">
         <span style="color:#64748b">${k}</span><span>${escHtml(v || '–')}</span>
       </div>`).join('');

    const flags = [
      d.allow_alliance_members && 'Alliance allowed',
      d.allow_corporation_members && 'Corp allowed',

    ].filter(Boolean).map(t =>
      `<span class="badge badge-muted" style="margin-right:0.3rem">${t}</span>`).join('');

    return `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
        <div>
          <div style="font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.5rem">Fuel Bay</div>
