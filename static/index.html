  // ── Modal ─────────────────────────────────────────────────────────────────

  function showModal(title, body) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = body;
    document.getElementById('modal-backdrop').classList.remove('hidden');
  }
  function setModalBody(html) {
    document.getElementById('modal-body').innerHTML = html;
  }
  function closeModal() {
    document.getElementById('modal-backdrop').classList.add('hidden');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Projects ──────────────────────────────────────────────────────────────

  let projectsTimer = null;
  let projectsCache = null;
  const projectSort = { col: 'priority', dir: 'asc' };

  function projectSortVal(p, col) {
    switch (col) {
      case 'priority': return p.sort_priority ?? 999;
      case 'name':     return (p.name || '').toLowerCase();
      case 'progress': {
        const cur = p.progress?.current ?? 0;
        const des = p.progress?.desired ?? 0;
        return des > 0 ? cur / des : 0;
      }
      case 'value':    return p.reward?.initial ?? 0;
      default:         return 0;
    }
  }

  function sortProjects(list) {
    const { col, dir } = projectSort;
    const sorted = [...list].sort((a, b) => {
      const va = projectSortVal(a, col);
      const vb = projectSortVal(b, col);
      if (va < vb) return -1;
      if (va > vb) return 1;
      // tie-breaker: name asc
      const na = (a.name || '').toLowerCase();
      const nb = (b.name || '').toLowerCase();
      return na < nb ? -1 : na > nb ? 1 : 0;
    });
    return dir === 'desc' ? sorted.reverse() : sorted;
  }

  function setProjectSort(col) {
    if (projectSort.col === col) {
      projectSort.dir = projectSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      projectSort.col = col;
      projectSort.dir = (col === 'progress' || col === 'value') ? 'desc' : 'asc';
    }
    updateProjectSortButtons();
    if (projectsCache) renderProjects(projectsCache);
  }

  function updateProjectSortButtons() {
    ['priority', 'name', 'progress', 'value'].forEach(c => {
      const btn = document.getElementById('proj-sort-' + c);
      if (!btn) return;
      const active = projectSort.col === c;
      btn.classList.toggle('active', active);
      const base = c[0].toUpperCase() + c.slice(1);
      btn.innerHTML = active
        ? `${base}<span class="proj-sort-arrow">${projectSort.dir === 'asc' ? '▲' : '▼'}</span>`
        : base;
    });
  }

  async function loadProjects() {
    if (projectsTimer) clearTimeout(projectsTimer);
    try {
      const r = await fetch('/api/projects');
      if (!r.ok) {
        showError('projects-error', r.status === 403
          ? 'Insufficient corporation roles to view projects.'
          : 'ESI unavailable — projects could not be loaded.');
        return;
      }
      hideError('projects-error');
      renderProjects(await r.json());
    } catch {
      showError('projects-error', 'Network error — could not load projects.');
    }
    projectsTimer = setTimeout(loadProjects, 120000);
  }

  function showProjectTab(tab) {
    ['active', 'closed'].forEach(t => {
      document.getElementById('pane-' + t).classList.toggle('hidden', t !== tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
  }

  function renderProjects(data) {
    projectsCache = data;
    const { active = [], closed = [], market_error } = data;
    document.getElementById('count-active').textContent = active.length;
    document.getElementById('count-closed').textContent = closed.length;
    updateProjectSortButtons();
    const marketNotice = market_error
      ? `<div class="card-error" style="margin-bottom:1rem">
           Market price comparison unavailable: ${escHtml(market_error)}
         </div>`
      : '';
    document.getElementById('pane-active').innerHTML =
      marketNotice + projectListHtml(sortProjects(active), 'No active projects.');
    document.getElementById('pane-closed').innerHTML =
      projectListHtml(sortProjects(closed), 'No closed projects.');
  }

  function projectListHtml(projects, emptyMsg) {
    if (!projects.length) return `<p class="contract-empty">${emptyMsg}</p>`;
    return `<div class="layout">${projects.map(projectCard).join('')}</div>`;
  }

  function projectCard(p) {
    const cur = p.progress?.current ?? 0;
    const des = p.progress?.desired ?? 0;
    const pct = des > 0 ? Math.min(100, (cur / des) * 100) : 0;
    const reward = p.reward
      ? `<div class="metric">
           <div class="label">Reward Pool</div>
           <div class="val">${fmtISK(p.reward.remaining || 0)}<span class="unit">/ ${fmtISK(p.reward.initial || 0)} ISK</span></div>
         </div>`
      : '';
    const m = p.market;
    const needsUpdate = m?.needs_update;
    const cardClass = (needsUpdate ? 'card card-warn' : 'card') + ' project-clickable';
    const updateBadge = needsUpdate
      ? '<span class="badge badge-red" style="margin-left:0.4rem">Update</span>'
      : '';
    const marketBlock = m ? `
      <div style="margin-top:0.75rem;padding-top:0.6rem;border-top:1px solid #2d3348;font-size:0.75rem">
        <div style="display:flex;justify-content:space-between;color:#94a3b8;margin-bottom:0.2rem">
          <span>Project Price</span>
          <span style="color:${needsUpdate ? '#fca5a5' : '#e2e8f0'};font-weight:600">
            ${fmtISK(m.project_price)} ISK/u
          </span>
        </div>
        <div style="display:flex;justify-content:space-between;color:#64748b">
          <span>Jita 4-4 buy max × ${(m.target_price / m.jita_buy_max).toFixed(2)}</span>
          <span style="color:#94a3b8">${fmtISK(m.target_price)} ISK/u</span>
        </div>
        <div style="display:flex;justify-content:space-between;color:#475569;font-size:0.7rem;margin-top:0.15rem">
          <span>Market high (Jita 4-4)</span>
          <span>${fmtISK(m.jita_buy_max)} ISK/u</span>
        </div>
        ${needsUpdate
          ? `<div style="margin-top:0.4rem;font-size:0.7rem;color:#f87171">
               Off by ${(m.diff_ratio * 100).toFixed(1)}% — review reward
             </div>`
          : ''}
      </div>` : '';
    return `
      <div class="${cardClass}" onclick="openProjectContributors('${p.id}')">
        <div style="display:flex;justify-content:space-between;align-items:start;gap:0.5rem;margin-bottom:0.75rem">
          <div style="font-size:0.95rem;font-weight:600;color:#f8fafc">${escHtml(p.name)}</div>
          <div>${projectPriorityBadge(p.sort_priority)}${stateBadge(p.state)}${updateBadge}</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>Progress</span>
            <span>${fmtNum(cur)} / ${fmtNum(des)}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        ${reward}
        ${marketBlock}
        <div style="margin-top:0.75rem;font-size:0.7rem;color:#475569">
          Last modified: ${new Date(p.last_modified).toLocaleDateString()}
        </div>
      </div>`;
  }

  async function openProjectContributors(projectId) {
    const project = [
      ...(projectsCache?.active || []),
      ...(projectsCache?.closed || []),
    ].find(p => p.id === projectId);
    if (!project) return;
    showModal(project.name, '<div style="color:#475569;text-align:center;padding:1.5rem">Loading contributors…</div>');
    try {
      const r = await fetch(`/api/projects/${encodeURIComponent(projectId)}/contributors`);
      if (!r.ok) {
        const detail = await r.json().catch(() => ({}));
        setModalBody(cardErrorBlock(detail.detail || `Failed to load (${r.status})`));
        return;
      }
      const data = await r.json();
      setModalBody(renderContributors(project, data.contributors || []));
    } catch {
      setModalBody(cardErrorBlock('Network error'));
    }
  }

  function renderContributors(project, contributors) {
    if (!contributors.length) {
      return '<p style="color:#475569;text-align:center;padding:1rem">No contributors yet.</p>';
    }
    const sorted = [...contributors].sort((a, b) => b.contributed - a.contributed);
    const totalContributed = sorted.reduce((s, c) => s + (c.contributed || 0), 0);
    const projTotal = project.progress?.current || totalContributed;
    const desired = project.progress?.desired || 0;
    const pctDone = desired ? Math.min(100, (projTotal / desired) * 100) : 0;
    const rewardLine = project.reward ? `
      <div style="display:flex;justify-content:space-between;color:#64748b;font-size:0.7rem;margin-top:0.2rem">
        <span>Reward pool</span>
        <span>${fmtISK(project.reward.remaining || 0)} / ${fmtISK(project.reward.initial || 0)} ISK remaining</span>
      </div>` : '';
    const header = `
      <div style="margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid #2d3348">
        <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:#94a3b8;margin-bottom:0.4rem">
          <span>${sorted.length} contributor${sorted.length === 1 ? '' : 's'}</span>
          <span>${fmtNum(projTotal)} / ${fmtNum(desired)} delivered (${pctDone.toFixed(1)}%)</span>
        </div>
        <div style="height:5px;background:#252a3d;border-radius:3px;overflow:hidden">
          <div style="height:100%;background:#38bdf8;width:${pctDone}%"></div>
        </div>
        ${rewardLine}
      </div>`;

    const rows = sorted.map((c, i) => {
      const pct = projTotal > 0 ? (c.contributed / projTotal * 100) : 0;
      const isoLast = c.last_modified ? new Date(c.last_modified).toLocaleDateString() : '';
      return `
        <div style="display:grid;grid-template-columns:24px 36px 1fr auto;gap:0.75rem;
                    align-items:center;padding:0.5rem 0;border-bottom:1px solid #1a1e2e">
          <span style="color:#475569;font-size:0.75rem;text-align:right;font-variant-numeric:tabular-nums">${i + 1}</span>
          <img src="https://images.evetech.net/characters/${c.id}/portrait?size=64"
               alt="" style="width:32px;height:32px;border-radius:50%;background:#252a3d">
          <div style="min-width:0">
            <div style="color:#e2e8f0;font-weight:500;display:flex;align-items:center;gap:0.4rem">
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(c.name || 'Unknown')}</span>
              ${characterZkillLink(c.id)}
            </div>
            <div style="height:4px;background:#252a3d;border-radius:2px;margin-top:0.3rem;overflow:hidden">
              <div style="height:100%;background:#38bdf8;width:${pct.toFixed(1)}%"></div>
            </div>
            ${isoLast ? `<div style="font-size:0.65rem;color:#475569;margin-top:0.15rem">last contribution ${isoLast}</div>` : ''}
          </div>
          <div style="text-align:right">
            <div style="color:#38bdf8;font-weight:600;font-size:0.85rem">${fmtNum(c.contributed)}</div>
            <div style="color:#64748b;font-size:0.7rem">${pct.toFixed(1)}%</div>
          </div>
        </div>`;
    }).join('');

    return header + rows;
  }

  function projectPriorityBadge(prio) {
    // Priority 2 (Update needed) already gets its own badge from the market block.
    if (prio === 1) return '<span class="badge badge-purple" style="margin-right:0.3rem">Track</span>';
    if (prio === 3) return '<span class="badge badge-green" style="margin-right:0.3rem">Loot</span>';
    return '';
  }

  function stateBadge(state) {
    const cls = {
      Active: 'badge-green',
      Completed: 'badge-blue',
      Closed: 'badge-muted',
      Expired: 'badge-orange',
    }[state] || 'badge-muted';
    return `<span class="badge ${cls}">${escHtml(state || '')}</span>`;
  }

  // ── Admin ─────────────────────────────────────────────────────────────────

  async function loadAdmin() {
    hideError('admin-error');
    await Promise.all([loadAdminUsers(), loadAdminCaches()]);
  }

  async function loadAdminUsers() {
    try {
      const r = await fetch('/api/admin/users');
      if (!r.ok) {
        showError('admin-error',
          r.status === 403 ? 'Admin access required.' : `Failed to load users (${r.status})`);
        return;
      }
      renderAdmin(await r.json());
    } catch {
      showError('admin-error', 'Network error — could not load users.');
    }
  }

  async function loadAdminCaches() {
    try {
      const r = await fetch('/api/admin/cache');
      if (!r.ok) return;
      renderAdminCaches(await r.json());
    } catch {}
  }

  function renderAdminCaches(data) {
    const list = data.caches || [];
    const totalRows = list.reduce((s, c) => s + (c.rows || 0), 0);
    const rows = list.map(c => `
      <tr>
        <td style="color:#e2e8f0;font-weight:600">${escHtml(c.name)}</td>
        <td style="color:#64748b;font-size:0.75rem">${c.kind === 'memory' ? 'in-memory' : 'database'}</td>
        <td style="color:#38bdf8;font-variant-numeric:tabular-nums">${fmtNum(c.rows)}</td>
        <td>
          <button class="btn-logout" onclick="adminPurgeCache('${c.name}')"
                  ${c.rows ? '' : 'disabled style="opacity:0.4;cursor:not-allowed"'}>
            Purge
          </button>
        </td>
      </tr>`).join('');
    document.getElementById('admin-caches').innerHTML = `
      <div class="card full">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
          <div class="card-title" style="margin:0">Caches
            <span class="badge badge-muted" style="margin-left:0.4rem">${fmtNum(totalRows)} entries</span>
          </div>
          <button class="btn-logout" onclick="adminPurgeCache('all')"
                  style="border-color:#ef4444;color:#fca5a5">
            Purge All
          </button>
        </div>
        <table>
          <thead><tr>
            <th>Cache</th><th>Kind</th><th>Entries</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  async function adminPurgeCache(name) {
    if (!confirm(`Purge ${name === 'all' ? 'ALL caches' : 'the ' + name + ' cache'}?`)) return;
    try {
      const r = await fetch(`/api/admin/cache/${encodeURIComponent(name)}/purge`, { method: 'POST' });
      if (!r.ok) {
        showError('admin-error', `Purge failed (${r.status})`);
        return;
      }
      loadAdminCaches();
    } catch {
      showError('admin-error', 'Network error during purge.');
    }
  }

  function renderAdmin(data) {
    const users = data.users || [];
    if (!users.length) {
      document.getElementById('admin-content').innerHTML =
        '<p class="contract-empty">No users yet.</p>';
      return;
    }
    const rows = users.map(u => {
      const banned = !!u.banned;
      const created  = u.created_at    ? new Date(u.created_at * 1000).toLocaleDateString() : '–';
      const login    = u.last_login_at ? new Date(u.last_login_at * 1000).toLocaleString() : '–';
      const seen     = u.last_seen_at  ? new Date(u.last_seen_at * 1000).toLocaleString() : '–';
      const statusBadge = banned
        ? '<span class="badge badge-red">Banned</span>'
        : '<span class="badge badge-green">Active</span>';
      const actionBtn = banned
        ? `<button class="btn-logout" onclick="adminToggleBan(${u.character_id}, 'unban')">Unban</button>`
        : `<button class="btn-logout" onclick="adminToggleBan(${u.character_id}, 'ban')">Ban</button>`;
      return `
        <tr>
          <td style="color:#e2e8f0;display:flex;align-items:center;gap:0.5rem">
            <img src="https://images.evetech.net/characters/${u.character_id}/portrait?size=64"
                 style="width:28px;height:28px;border-radius:50%;background:#252a3d">
            <span>${escHtml(u.character_name || 'Unknown')}</span>
            ${characterZkillLink(u.character_id)}
          </td>
          <td style="color:#64748b;font-size:0.75rem;font-variant-numeric:tabular-nums">${u.character_id}</td>
          <td style="color:#94a3b8">${created}</td>
          <td style="color:#94a3b8">${login}</td>
          <td style="color:#94a3b8">${seen}</td>
          <td>${statusBadge}</td>
          <td>${actionBtn}</td>
        </tr>`;
    }).join('');
    document.getElementById('admin-content').innerHTML = `
      <div class="card full">
        <table>
          <thead><tr>
            <th>Character</th><th>ID</th><th>First Login</th><th>Last Login</th>
            <th>Last Seen</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  async function adminToggleBan(characterId, action) {
    if (!confirm(`${action === 'ban' ? 'Ban' : 'Unban'} character ${characterId}?`)) return;
    try {
      const r = await fetch(`/api/admin/users/${characterId}/${action}`, { method: 'POST' });
      if (!r.ok) {
        showError('admin-error', `Action failed (${r.status})`);
        return;
      }
      loadAdmin(); // refresh
    } catch {
      showError('admin-error', 'Network error during action.');
    }
  }

  // ── Member ────────────────────────────────────────────────────────────────

  async function loadMember() {
    hideError('member-error');
    pendingContracts = null;
    // Show skeleton immediately, then load profile + contracts in parallel.
    renderMemberSkeleton();
    fetchSection('/api/member',         renderMemberProfile,   'profile-error');
    // Contracts: instant render from sessionStorage if we have it, then revalidate.
    const cached = sessionStorage.getItem('me-contracts');
    if (cached) {
      try { renderMemberContracts(JSON.parse(cached), null); } catch {}
    }
    fetchSection('/api/me/contracts', (data, err) => {
      if (data) sessionStorage.setItem('me-contracts', JSON.stringify(data));
      renderMemberContracts(data, err);
    }, 'contracts-error');
  }

  async function fetchSection(url, renderer, errorId) {
    try {
      const r = await fetch(url);
      if (!r.ok) {
        const detail = await r.json().catch(() => ({}));
        renderer(null, detail.detail || `Failed (${r.status})`);
        return;
      }
      renderer(await r.json(), null);
    } catch (e) {
      renderer(null, 'Network error');
    }
  }

  function renderMemberSkeleton() {
    document.getElementById('member-grid').innerHTML = `
      <div class="card"><div class="card-title">Character</div>
        <div class="skeleton" style="height:100px"></div></div>
      <div class="card"><div class="card-title">Location &amp; Ship</div>
        <div class="skeleton" style="height:100px"></div></div>
      <div class="card"><div class="card-title">Financials &amp; Skills</div>
        <div class="skeleton" style="height:100px"></div></div>
      <div class="card full"><div class="card-title">Your Contracts</div>
        <div class="skeleton" style="height:60px"></div></div>`;
  }

  function sectionData(section) {
    // Helper: return data or null if section errored/missing
    return section?.data ?? null;
  }

  function sectionError(section) {
    return section?.error ?? null;
  }

  function cardErrorBlock(label) {
    return `<div class="card-error">${escHtml(label)}</div>`;
  }

  function renderMemberProfile(m, topError) {
    const grid = document.getElementById('member-grid');
    if (!m) {
      grid.innerHTML = `<div class="card full">${cardErrorBlock('Profile: ' + (topError || 'failed'))}</div>`;
      // Keep contracts skeleton — it has its own request
      return;
    }
    grid.innerHTML = `
      ${renderCharacterCard(m)}
      ${renderLocationShipCard(m)}
      ${renderFinancialsCard(m)}
      ${renderAttributesCard(m)}
      ${renderSkillQueueCard(m)}
      <div class="card full" id="contracts-card">
        <div class="card-title">Your Contracts</div>
        <div class="skeleton" style="height:60px"></div>
      </div>`;
    fetchCorpName(sectionData(m.profile)?.corporation_id);
    // If contracts already arrived before this profile render, flush them now.
    if (pendingContracts) {
      const { data, error } = pendingContracts;
      renderMemberContracts(data, error);
    }
  }

  function renderMemberContracts(data, error) {
    const card = document.getElementById('contracts-card');
    if (!card) {
      // Profile hasn't created the card yet; stash and let renderMemberProfile flush.
      pendingContracts = { data, error };
      return;
    }
    pendingContracts = null;
    if (error) {
      card.innerHTML = `
        <div class="card-title">Your Contracts</div>
        ${cardErrorBlock('Contracts: ' + error)}`;
      return;
    }
    personalContractsCache = data;
    card.innerHTML = `
      <div class="card-title">Your Contracts ${contractCountsBadge(data.contracts)}</div>
      ${renderPersonalContracts(data.contracts, data.character_id)}`;
  }

  function renderCharacterCard(m) {
    const charErr = sectionError(m.profile);
    const onlineErr = sectionError(m.online);
    const p = sectionData(m.profile);
    const o = sectionData(m.online);
    if (charErr && !p) {
      return `<div class="card"><div class="card-title">Character</div>${cardErrorBlock(charErr)}</div>`;
    }
    const secStatColor = p && p.security_status >= 0 ? '#4ade80' : '#f87171';
    const secSign      = p && p.security_status >= 0 ? '+' : '';
    const onlineDot = o?.is_online
      ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;margin-right:0.4rem"></span>'
      : '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#475569;margin-right:0.4rem"></span>';
    const onlineLabel = onlineErr ? 'Online status unavailable' : (o?.is_online ? 'Online' : 'Offline');
    return `
      <div class="card">
        <div class="card-title">Character</div>
        <div class="char-card">
          <img class="char-portrait"
               src="https://images.evetech.net/characters/${m.character_id}/portrait?size=128" alt="">
          <div class="char-info">
            <div class="name" style="display:flex;align-items:center;gap:0.4rem">
              ${escHtml(p?.character_name || 'Unknown')}
              ${characterZkillLink(m.character_id)}
            </div>
            <div class="corp" id="corp-name-display">Corp ID: ${p?.corporation_id ?? '–'}</div>
            <div class="sec-status" style="color:${secStatColor}">
              Security Status: ${p ? secSign + p.security_status.toFixed(1) : '–'}
            </div>
            <div style="font-size:0.8rem;color:#94a3b8;margin-top:0.4rem">
              ${onlineDot}${onlineLabel}
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderLocationShipCard(m) {
    const locErr = sectionError(m.location);
    const shipErr = sectionError(m.ship);
    const loc = sectionData(m.location);
    const ship = sectionData(m.ship);

    const locationBlock = locErr
      ? cardErrorBlock('Location: ' + locErr)
      : (() => {
          const sysSec = loc?.system_security;
          const sysSecText = (typeof sysSec === 'number')
            ? ` <span style="color:${secColor(sysSec)}">${sysSec.toFixed(1)}</span>` : '';
          const dockedRow = loc?.docked_at
            ? `<div class="metric"><div class="label">Docked at</div>
                 <div style="font-size:0.95rem;color:#e2e8f0;font-weight:600">${escHtml(loc.docked_at)}</div>
               </div>`
            : `<div class="metric"><div class="label">Status</div>
                 <div style="font-size:0.95rem;color:#94a3b8;font-weight:600">In Space</div>
               </div>`;
          return `
            <div class="metrics">
              <div class="metric">
                <div class="label">Solar System</div>
                <div style="font-size:0.95rem;color:#e2e8f0;font-weight:600">
                  ${escHtml(loc?.system_name || '–')}${sysSecText}${systemLinks(loc?.system_name, loc?.system_id)}
                </div>
              </div>
              ${dockedRow}
            </div>`;
        })();

    const shipBlock = shipErr
      ? cardErrorBlock('Ship: ' + shipErr)
      : `<div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem;
                    background:#252a3d;border-radius:8px;padding:0.6rem 0.75rem">
          ${ship?.type_id
            ? `<img src="https://images.evetech.net/types/${ship.type_id}/render?size=64"
                    alt="" style="width:48px;height:48px;border-radius:4px;background:#1e2130">`
            : ''}
          <div style="flex:1;min-width:0">
            <div style="font-size:0.7rem;color:#475569;text-transform:uppercase;letter-spacing:0.06em">Active Ship</div>
            <div style="font-size:0.9rem;color:#e2e8f0;font-weight:600;
                        white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${escHtml(ship?.name || '–')}
            </div>
            <div style="font-size:0.75rem;color:#94a3b8">${escHtml(ship?.type_name || '')}</div>
          </div>
        </div>`;

    return `<div class="card">
      <div class="card-title">Location &amp; Ship</div>
      ${locationBlock}
      ${shipBlock}
    </div>`;
  }

  function renderFinancialsCard(m) {
    const walletErr = sectionError(m.wallet);
    const skillsErr = sectionError(m.skills);
    const wallet = sectionData(m.wallet);
    const skills = sectionData(m.skills);
    const online = sectionData(m.online);

    const walletStr = fmtISKLong(wallet || 0);
    // Very long strings (12+ chars like "100,000.0 M") shrink to fit the card.
    const valSizeCls = walletStr.length >= 12 ? ' val-sm' : '';
    const walletCell = walletErr
      ? `<div class="metric">${cardErrorBlock(walletErr)}</div>`
      : `<div class="metric">
           <div class="label">Wallet Balance</div>
           <div class="val${valSizeCls}" title="${new Intl.NumberFormat().format(Math.round(wallet || 0))} ISK">
             ${walletStr}<span class="unit">ISK</span>
           </div>
         </div>`;
    const skillsCell = skillsErr
      ? `<div class="metric">${cardErrorBlock(skillsErr)}</div>`
      : `<div class="metric">
           <div class="label">Total Skillpoints</div>
           <div class="val">${fmtSP(skills?.total_sp || 0)}<span class="unit">SP</span></div>
         </div>`;

    return `
      <div class="card">
        <div class="card-title">Financials &amp; Skills</div>
        <div class="metrics">
          ${walletCell}
          ${skillsCell}
        </div>
        <div style="margin-top:0.75rem;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;
                    font-size:0.7rem;color:#64748b">
          <div>
            <div style="text-transform:uppercase;letter-spacing:0.06em">Last Login</div>
            <div style="color:#94a3b8;font-size:0.8rem;margin-top:0.15rem">
              ${online?.last_login ? new Date(online.last_login).toLocaleString() : '–'}
            </div>
          </div>
          <div>
            <div style="text-transform:uppercase;letter-spacing:0.06em">Total Logins</div>
            <div style="color:#94a3b8;font-size:0.8rem;margin-top:0.15rem">
              ${online?.logins != null ? fmtNum(online.logins) : '–'}
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderAttributesCard(m) {
    const err = sectionError(m.attributes);
    const a = sectionData(m.attributes);
    if (err && !a) {
      return `<div class="card"><div class="card-title">Attributes</div>${cardErrorBlock(err)}</div>`;
    }
    const attrs = [
      ['Perception',  a?.perception],
      ['Memory',      a?.memory],
      ['Willpower',   a?.willpower],
      ['Intelligence', a?.intelligence],
      ['Charisma',    a?.charisma],
    ];
    const maxVal = Math.max(...attrs.map(([, v]) => v || 0), 27);
    const rows = attrs.map(([label, val]) => `
      <div style="display:grid;grid-template-columns:90px 1fr 30px;align-items:center;gap:0.5rem;
                  padding:0.2rem 0;font-size:0.78rem">
        <span style="color:#64748b">${label}</span>
        <div style="height:5px;background:#252a3d;border-radius:3px;overflow:hidden">
          <div style="height:100%;background:#38bdf8;width:${((val || 0) / maxVal * 100).toFixed(0)}%"></div>
        </div>
        <span style="color:#e2e8f0;text-align:right;font-weight:600">${val ?? '–'}</span>
      </div>`).join('');
    const lastRemap = a?.last_remap_date ? new Date(a.last_remap_date).toLocaleDateString() : '–';
    const bonusRemaps = a?.bonus_remaps ?? 0;
    return `
      <div class="card">
        <div class="card-title">Attributes</div>
        ${rows}
        <div style="margin-top:0.6rem;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;
                    font-size:0.7rem;color:#64748b">
          <div>
            <div style="text-transform:uppercase;letter-spacing:0.06em">Last Remap</div>
            <div style="color:#94a3b8;font-size:0.8rem;margin-top:0.15rem">${lastRemap}</div>
          </div>
          <div>
            <div style="text-transform:uppercase;letter-spacing:0.06em">Bonus Remaps</div>
            <div style="color:#94a3b8;font-size:0.8rem;margin-top:0.15rem">${bonusRemaps}</div>
          </div>
        </div>
      </div>`;
  }

  function renderSkillQueueCard(m) {
    const err = sectionError(m.skillqueue);
    const queue = sectionData(m.skillqueue);
    if (err && !queue) {
      return `<div class="card"><div class="card-title">Skill Queue</div>${cardErrorBlock(err)}</div>`;
    }
    if (!queue?.length) {
      return `<div class="card"><div class="card-title">Skill Queue</div>
        <p style="color:#475569;font-size:0.85rem;padding:0.5rem 0">Queue is empty.</p></div>`;
    }
    const now = Date.now();
    const current = queue.find(s => {
      const start = s.start_date ? new Date(s.start_date).getTime() : 0;
      const finish = s.finish_date ? new Date(s.finish_date).getTime() : 0;
      return start && finish && start <= now && now < finish;
    }) || queue[0];

    const currentBlock = current
      ? (() => {
          const trainStartSP = current.training_start_sp ?? current.level_start_sp ?? 0;
          const endSP        = current.level_end_sp ?? 0;
          // Time fraction through this training session.
          let timeFrac = 0;
          if (current.start_date && current.finish_date) {
            const s = new Date(current.start_date).getTime();
            const f = new Date(current.finish_date).getTime();
            if (f > s) timeFrac = Math.max(0, Math.min(1, (now - s) / (f - s)));
          }
          // Current SP includes the baseline SP already trained for the level.
          const currentSP = Math.round(trainStartSP + (endSP - trainStartSP) * timeFrac);
          const barPct    = endSP > 0 ? (currentSP / endSP) * 100 : 0;
          const remaining = current.finish_date
            ? Math.max(0, new Date(current.finish_date).getTime() - now)
            : null;
          return `
            <div style="background:#252a3d;border-radius:8px;padding:0.7rem 0.85rem">
              <div style="display:flex;justify-content:space-between;align-items:baseline;gap:0.5rem;margin-bottom:0.4rem">
                <div style="color:#e2e8f0;font-weight:600;font-size:0.88rem">
                  ${escHtml(current.skill_name || 'Skill #' + current.skill_id)}
                  <span style="color:#38bdf8;margin-left:0.3rem">${romanLevel(current.finished_level)}</span>
                </div>
                <div style="color:#94a3b8;font-size:0.75rem">
                  ${remaining != null ? fmtDuration(remaining / 1000) + ' left' : '–'}
                </div>
              </div>
              <div style="height:6px;background:#1a1e2e;border-radius:3px;overflow:hidden">
                <div style="height:100%;background:#38bdf8;width:${barPct.toFixed(1)}%"></div>
              </div>
              <div style="font-size:0.7rem;color:#64748b;margin-top:0.3rem">
                ${fmtNum(currentSP)} / ${fmtNum(endSP)} SP
              </div>
            </div>`;
        })()
      : '';

    const upcoming = queue.filter(s => s !== current).slice(0, 6);
    const upcomingBlock = upcoming.length ? `
      <div style="margin-top:0.7rem">
        <div style="font-size:0.65rem;color:#475569;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.3rem">
          Next ${upcoming.length} of ${queue.length - (current ? 1 : 0)} queued
        </div>
        ${upcoming.map(s => `
          <div style="display:flex;justify-content:space-between;font-size:0.75rem;
                      padding:0.25rem 0;border-bottom:1px solid #1a1e2e;color:#94a3b8">
            <span>${escHtml(s.skill_name || 'Skill #' + s.skill_id)}
              <span style="color:#38bdf8">${romanLevel(s.finished_level)}</span></span>
            <span style="color:#64748b">${s.finish_date ? new Date(s.finish_date).toLocaleDateString() : '–'}</span>
          </div>`).join('')}
      </div>` : '';

    return `
      <div class="card">
        <div class="card-title">Skill Queue
          <span class="badge badge-muted" style="margin-left:0.4rem">${queue.length}</span>
        </div>
        ${currentBlock}
        ${upcomingBlock}
      </div>`;
  }

  function romanLevel(n) {
    return ['', 'I', 'II', 'III', 'IV', 'V'][n] || String(n);
  }

  function fetchCorpName(corpId) {
    if (!corpId) return;
    fetch(`https://esi.evetech.net/latest/corporations/${corpId}/`)
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById('corp-name-display');
        if (el && d.name) el.textContent = d.name;
      })
      .catch(() => {});
  }

  // ── Personal contracts (member card) ──────────────────────────────────────

  let personalContractsCache = null;
  // Holds the most recent /api/me/contracts result if it arrived before
  // the profile fetch created the contracts-card DOM node. Flushed and
  // rendered as soon as the profile completes.
  let pendingContracts = null;
  const personalSort = { col: 'priority', dir: 'asc' };

  function contractCountsBadge(list) {
    if (!list?.length) return '';
    const crit = list.filter(c => c.category === 'critical').length;
    const warn = list.filter(c => c.category === 'warning').length;
    const parts = [];
    if (crit) parts.push(`<span class="badge badge-red" style="margin-left:0.4rem">${crit} need action</span>`);
    if (warn) parts.push(`<span class="badge badge-orange" style="margin-left:0.4rem">${warn} expiring</span>`);
    return parts.join('');
  }

  function personalSortVal(c, col) {
    switch (col) {
      case 'priority':     return c.priority ?? 999;
      case 'title':        return (c.title || ('Contract #' + c.contract_id)).toLowerCase();
      case 'counterparty': return (c.assignee_name || c.acceptor_name || c.issuer_name || '').toLowerCase();
      case 'value':        return c.price || c.reward || c.buyout || 0;
      case 'time':         return c.date_expired ? new Date(c.date_expired).getTime() : Infinity;
      default:             return 0;
    }
  }

  function sortPersonal(list) {
    const { col, dir } = personalSort;
    const sorted = [...list].sort((a, b) => {
      const va = personalSortVal(a, col);
      const vb = personalSortVal(b, col);
      if (va < vb) return -1;
      if (va > vb) return 1;
      return 0;
    });
    return dir === 'desc' ? sorted.reverse() : sorted;
  }

  function setPersonalSort(col) {
    if (personalSort.col === col) {
      personalSort.dir = personalSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      personalSort.col = col;
      personalSort.dir = (col === 'value' || col === 'time') ? 'desc' : 'asc';
    }
    if (personalContractsCache) renderMemberContracts(personalContractsCache, null);
  }

  function personalSortableTh(col, label) {
    const s = personalSort;
    const active = s.col === col;
    const arrow = active ? (s.dir === 'asc' ? '▲' : '▼') : '↕';
    const cls = 'sortable' + (active ? ' sort-active' : '');
    return `<th class="${cls}" onclick="setPersonalSort('${col}')">${label}<span class="sort-arrow">${arrow}</span></th>`;
  }

  function renderPersonalContracts(list, myId) {
    if (!list?.length) return '<p class="pc-empty">No personal contracts.</p>';
    const sorted = sortPersonal(list);
    return `<table>
      <thead><tr>
        ${personalSortableTh('priority', 'Priority')}
        ${personalSortableTh('title', 'Title')}
        ${personalSortableTh('counterparty', 'Counterparty')}
        ${personalSortableTh('value', 'Value')}
        ${personalSortableTh('time', 'Time Left')}
        <th></th>
      </tr></thead>
      <tbody>
        ${sorted.map(c => personalRow(c, myId)).join('')}
      </tbody>
    </table>`;
  }

  function personalRow(c, myId) {
    const cat = c.category || 'ok';
    const role = c.issuer_id === myId ? 'sent' : 'received';
    const other = role === 'sent'
      ? (c.assignee_name || c.acceptor_name || 'Public')
      : (c.issuer_name || 'Unknown');
    const value = c.price || c.reward || c.buyout || 0;
    const valueStr = value > 0 ? fmtISK(value) + ' ISK' : '–';
    const time = c.time_left_sec != null
      ? (c.time_left_sec <= 0 ? 'expired' : fmtDuration(c.time_left_sec))
      : (c.date_expired ? new Date(c.date_expired).toLocaleDateString() : '–');
    const attention = c.attention
      ? `<div style="font-size:0.7rem;color:${cat === 'critical' ? '#f87171' : '#fb923c'};margin-top:0.15rem">${escHtml(c.attention)}</div>`
      : '';
    const catLabel = {
      critical: '<span style="color:#f87171;font-size:0.7rem;font-weight:700;text-transform:uppercase">Critical</span>',
      warning:  '<span style="color:#fb923c;font-size:0.7rem;font-weight:700;text-transform:uppercase">Warning</span>',
      ok:       '<span style="color:#4ade80;font-size:0.7rem;font-weight:700;text-transform:uppercase">OK</span>',
      done:     '<span style="color:#475569;font-size:0.7rem;font-weight:700;text-transform:uppercase">Done</span>',
    }[cat];
    return `<tr class="pc-${cat}">
      <td class="pc-priority-cell">${catLabel}</td>
      <td style="color:#e2e8f0">
        <div style="font-weight:500">${escHtml(c.title || ('Contract #' + c.contract_id))}</div>
        <div style="color:#64748b;font-size:0.7rem;margin-top:0.1rem">
          ${typeLabel(c.type)} · ${escHtml(c.status || '')}
        </div>
        ${attention}
      </td>
      <td style="color:#94a3b8">${role === 'sent' ? 'to ' : 'from '}${escHtml(other)}</td>
      <td style="color:#38bdf8;font-weight:600;white-space:nowrap">${valueStr}</td>
      <td style="color:#94a3b8;white-space:nowrap;font-size:0.75rem">${time}</td>
      <td>${openInEveBtn(c.contract_id)}</td>
    </tr>`;
  }

  function typeLabel(t) {
    return ({item_exchange: 'Item Exchange', courier: 'Courier',
             auction: 'Auction', loan: 'Loan'}[t] || t || 'Unknown');
  }

  function fmtDuration(secs) {
    if (secs < 3600)  return Math.floor(secs / 60)   + 'm';
    if (secs < 86400) return Math.floor(secs / 3600) + 'h';
    const d = Math.floor(secs / 86400);
    const h = Math.floor((secs % 86400) / 3600);
    return d + 'd ' + h + 'h';
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function fmtISK(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(2) + 'M';
    return new Intl.NumberFormat().format(Math.round(n));
  }

  // Longer form for places where extra digits are preferred (e.g. wallet).
  // Keeps M as the unit up to 1T so 2.28B reads as "2,280.0 M".
  function fmtISKLong(n) {
    if (n >= 1e12) return (n / 1e12).toLocaleString(undefined, {minimumFractionDigits: 3, maximumFractionDigits: 3}) + ' T';
    if (n >= 1e6)  return (n / 1e6 ).toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1}) + ' M';
    if (n >= 1e3)  return (n / 1e3 ).toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1}) + ' K';
    return new Intl.NumberFormat().format(Math.round(n));
  }

  function fmtSP(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
    return String(n);
  }

  function fmtNum(n) { return new Intl.NumberFormat().format(n); }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError(id) {
    document.getElementById(id).classList.remove('show');
  }

  boot();
</script>
</body>
</html>
